<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會考長文閱讀 題庫系統</title>
<style>
:root{--bg:#eef2ef;--card:#fff;--ink:#15241d;--mut:#5b6b63;--line:#dde6e1;
 --c國文:#7a4f2a;--c英文:#1f6f5c;--c社會:#03492d;--c自然:#8a6d1f;--acc:#03492d;}
*{box-sizing:border-box;}
body{margin:0;font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
 background:var(--bg);color:var(--ink);line-height:1.6;padding-bottom:90px;}
header{background:linear-gradient(135deg,#03492d,#0a6b43);color:#fff;padding:20px 24px;display:flex;align-items:center;gap:16px;}
header .htext{flex:1;}
header .hlogo{width:64px;height:64px;flex:none;}
header h1{margin:0 0 4px;font-size:1.5em;}
header p{margin:0;opacity:.9;font-size:.85em;}
.wrap{max-width:1080px;margin:0 auto;padding:16px;}
.controls{background:var(--card);border-radius:12px;padding:14px 16px;margin:16px 0;
 box-shadow:0 1px 3px rgba(0,0,0,.06);position:sticky;top:0;z-index:50;}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:6px 0;}
.row b{font-size:.85em;color:var(--mut);margin-right:4px;min-width:42px;}
.chip{border:2px solid var(--line);background:#fff;border-radius:20px;padding:4px 12px;
 cursor:pointer;font-size:.85em;user-select:none;transition:.15s;}
.chip.on{color:#fff;border-color:transparent;}
.chip.s國文.on{background:var(--c國文);} .chip.s英文.on{background:var(--c英文);}
.chip.s社會.on{background:var(--c社會);} .chip.s自然.on{background:var(--c自然);}
.chip.yr.on{background:var(--acc);}
input[type=search],input[type=number]{border:2px solid var(--line);border-radius:8px;padding:6px 10px;font-size:.85em;font-family:inherit;}
.btn{border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:.85em;font-weight:700;font-family:inherit;}
.btn.lite{background:#e4efe9;color:var(--acc);}
.btn.gen{background:var(--acc);color:#fff;}
.btn.word{background:#16a34a;color:#fff;}
.count{font-size:.8em;color:var(--mut);}
.card{background:var(--card);border-radius:12px;padding:14px 16px;margin:10px 0;
 box-shadow:0 1px 3px rgba(0,0,0,.05);border-left:5px solid var(--line);}
.card.sel{border-left-color:var(--acc);background:#f1f7f4;}
.chead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.chead input[type=checkbox]{width:20px;height:20px;cursor:pointer;flex:none;}
.badge{font-size:.78em;font-weight:700;color:#fff;padding:2px 10px;border-radius:14px;}
.b國文{background:var(--c國文);} .b英文{background:var(--c英文);} .b社會{background:var(--c社會);} .b自然{background:var(--c自然);}
.meta{font-size:.78em;color:var(--mut);}
.fig{font-size:.72em;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;padding:1px 8px;border-radius:10px;}
.toggle{margin-left:auto;font-size:.8em;color:var(--acc);cursor:pointer;background:none;border:none;font-family:inherit;}
.body{display:none;margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;}
.body.open{display:block;}
.passage{background:#f8fafc;border-left:4px solid #94a3b8;border-radius:6px;padding:10px 14px;font-size:.9em;white-space:pre-wrap;}
.qs{font-size:.86em;margin-top:8px;white-space:pre-wrap;color:#334155;}
.ans{margin-top:8px;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:6px;padding:8px 12px;font-size:.84em;display:none;}
.ans.show{display:block;}
.ans .a{font-weight:800;color:#047857;}
.bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);
 box-shadow:0 -2px 10px rgba(0,0,0,.08);padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;z-index:60;}
.bar .sp{flex:1;}
label.ck{font-size:.82em;color:var(--mut);display:flex;align-items:center;gap:5px;cursor:pointer;}
.note{font-size:.75em;color:var(--mut);margin-top:4px;}
@media print{.controls,.bar,header .sub{display:none;}}
</style>
</head>
<body>
<header>
<span class="hlogo"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><defs><path id="rt" d="M30,100 A70,70 0 0 1 170,100"/><path id="rb" d="M38,100 A62,62 0 0 0 162,100"/></defs><circle cx="100" cy="100" r="97" fill="#03492d"/><circle cx="100" cy="100" r="86" fill="none" stroke="#ffffff" stroke-width="2.5"/><text fill="#fff" font-family="Georgia,serif" font-size="12.5" letter-spacing="2" font-weight="600"><textPath href="#rt" startOffset="50%" text-anchor="middle">WEN TZAO SCHOOL</textPath></text><text fill="#fff" font-family="Georgia,serif" font-size="11" letter-spacing="2.5"><textPath href="#rb" startOffset="50%" text-anchor="middle">★ EST. 1999 ★</textPath></text><g fill="#fff"><polygon points="100,30 103,38 111,38 105,43 107,51 100,46 93,51 95,43 89,38 97,38"/><rect x="62" y="78" width="30" height="46"/><rect x="100" y="66" width="34" height="58"/></g><g fill="#03492d"><rect x="68" y="86" width="7" height="7"/><rect x="79" y="86" width="7" height="7"/><rect x="68" y="100" width="7" height="7"/><rect x="79" y="100" width="7" height="7"/><rect x="106" y="74" width="8" height="8"/><rect x="120" y="74" width="8" height="8"/><rect x="106" y="90" width="8" height="8"/><rect x="120" y="90" width="8" height="8"/><rect x="106" y="106" width="8" height="8"/><rect x="120" y="106" width="8" height="8"/></g><path d="M44,138 q14,-9 28,0 t28,0 t28,0 t28,0" fill="none" stroke="#fff" stroke-width="3.2"/><path d="M44,150 q14,-9 28,0 t28,0 t28,0 t28,0" fill="none" stroke="#fff" stroke-width="3.2"/></svg></span>
<div class="htext">
<h1>會考長文閱讀 · 題庫系統</h1>
<p class="sub">勾選你想要的題目，一鍵產生「投影片」或「Word 練習卷」。共 <span id="total"></span> 篇長文閱讀題（國文・英文・社會・自然，113～115 年）· 文藻美語 WENTZAO SCHOOL</p>
</div>
</header>
<div class="wrap">
<div class="controls">
  <div class="row"><b>科目</b>
    <span class="chip s國文 on" data-sub="國文" onclick="tog(this,'sub')">國文</span>
    <span class="chip s英文 on" data-sub="英文" onclick="tog(this,'sub')">英文</span>
    <span class="chip s社會 on" data-sub="社會" onclick="tog(this,'sub')">社會</span>
    <span class="chip s自然 on" data-sub="自然" onclick="tog(this,'sub')">自然</span>
  </div>
  <div class="row"><b>年份</b>
    <span class="chip yr on" data-yr="113" onclick="tog(this,'yr')">113年</span>
    <span class="chip yr on" data-yr="114" onclick="tog(this,'yr')">114年</span>
    <span class="chip yr on" data-yr="115" onclick="tog(this,'yr')">115年</span>
  </div>
  <div class="row"><b>字數</b> 至少 <input type="number" id="minlen" value="0" min="0" style="width:80px" oninput="render()"> 字/words
     <input type="search" id="q" placeholder="🔍 搜尋關鍵字…" oninput="render()" style="flex:1;min-width:160px">
  </div>
  <div class="row">
    <button class="btn lite" onclick="selAll(true)">全選（目前顯示）</button>
    <button class="btn lite" onclick="selAll(false)">全部取消</button>
    <button class="btn lite" onclick="toggleAnsAll()">顯示／隱藏所有答案</button>
    <span class="count" id="shown"></span>
  </div>
</div>
<div id="list"></div>
</div>
<div class="bar">
  <b>已選 <span id="nsel">0</span> 題</b>
  <label class="ck"><input type="checkbox" id="incAns"> 匯出時附上答案／詳解</label>
  <label class="ck"><input type="checkbox" id="hideSubj" checked> 投影片先隱藏科目（點一下才顯示）</label>
  <span class="sp"></span>
  <button class="btn gen" onclick="makeSlides()">🎬 產生投影片</button>
  <button class="btn word" onclick="makeWord()">📄 產生 Word</button>
</div>
<script>
const BANK = [{"year": "113", "subject": "國文", "qrange": "33-35", "passage": "2018年流傳一段影片，片中美國前總統歐巴馬竟語出驚人地說：「川普總統\n完全是個笨蛋！」儘管片中歐巴馬臉部表情、肢體語言都像極了他，但卻不是本\n尊。影片隨後出現演員皮爾，原來這是他模仿的影片，藉由深偽技術，竟可變成\n歐巴馬談話的片段。美國媒體製作這段影片的目的在提醒大眾，此類影片極可能\n成為操縱輿論的利器。當它漸趨氾濫時，散布者的罪惡感也會相對減少，最大的\n危機就是造成民眾對社會產生不信任感，逐步地破壞民主制度。\n深偽技術能製作的除了影像，也包括文字與聲音。一般人說的「人工智\n慧」，是一個很大的架構，其中一個領域是「機器學習」。而深偽技術是屬於\n「機器學習」裡的「深度學習」，它是以深度神經網路為架構，對資料表徵進行\n學習的演算法。\n深度學習技術在偽造影像的生成與辨識，是運用「生成對抗網路」，由\n「生成器」和「辨識器」兩個神經網路組成。生成器就像是演算法透過大量資料去\n學習狗的模樣，直到可以畫出狗。辨識器則是可以分辨畫的狗和照片的狗。這兩個\n模型結合後，就像是一邊有一個人畫狗，另一邊有一個老師說這跟真的狗差很多，\n所以畫的人要再修改。直到有一天這個人畫的狗能騙過老師，而老師在一次次判斷\n中也越來越厲害。偽造影像的生成與辨識，就是生成器和辨識器之間的競賽。\n深偽技術是近年新興的科技，若將它運用於影視作品，可節省製作電影或遊\n戲的時間，有正面的效益。但也有人利用合成的假影像操弄資訊，進而詐騙牟\n利、毀人聲譽，製造社會的動盪，讓這項技術引發爭議。\n——改寫自〈臺灣團隊研究辨識Deep Fake影片 深偽技術的正邪之戰開打〉", "questions": "33. 根據本文，下列圖表何者最適合用來呈現「人工智慧」、「機器學習」、\n「深度學習」三者之間的關係？\n34. 根據畫線處的文句，下列關係的說明，何者最接近文中「偽造影像的生成」與\n「偽造影像的辨識」兩者之間的競爭？\n(A)就像是光源和影子，透過光源的運用可使影子出現各種變化\n(B)就像是投影機和螢幕，投影機投射的影像須藉螢幕顯示出來\n(C)就像是自來水和水龍頭，當水龍頭開得越大，自來水的出水量就越大\n(D)就像是駭客與防毒軟體，當駭客發展出新病毒，防毒軟體就會再更新\n35. 根據本文，下列關於深偽技術或深偽影片的敘述，何者最恰當？\n(A)美國媒體藉由皮爾模仿的深偽影片操縱民主\n(B)演員可以透過深偽技術增進自己的表演技巧\n(C)氾濫的深偽影片將導致民眾對社會的信任度下降\n(D)深偽技術的爭議在人類的創意會被人工智慧取代", "length": 568, "unit": "字", "n_q": 3, "answers": [{"q": 33, "answer": "B", "explanation": "由引文「一般人說的『人工智慧』，是一個很大的架構，其中一個領域是『機器 學習』。而深偽技術是屬於『機器學習』裡的『深度學習』，它是以深度神經網 路為架構，對資料表徵進行學習的演算法。」可知，「機器學習」應包含在「人 工智慧」的領域中，而「深度學習」應被包含在「機器學習」領域中，因此（B） 最適合。"}, {"q": 34, "answer": "D", "explanation": "（A）的光源和影子是前者控制後者的關係，影子隨光而變。 （B）的投影機和螢幕是合作關係，兩者要合作才能顯示出影像。 （C）的自來水和水龍頭是後者控制前者的關係，藉由控制水龍頭來操縱自來水。 （D）駭客與防毒軟體之間是競爭關係，駭客發展新病毒就像是「偽造影像的生 成」，防毒軟體更新就像是「偽造影像的辨識」，兩者是競爭關係。因此 （D）最接近。"}, {"q": 35, "answer": "C", "explanation": "（A）由「美國媒體製作這段影片的目的在提醒大眾，此類影片極可能成為操縱輿 論的利器。」可知，美國媒體並非想操縱民主，只是要提醒大眾深偽影片的 危險性。 （B）文中並未提及演員使用深偽影片的好處，只提及「若將它運用於影視作品， 可節省製作電影或遊戲的時間，有正面的效益。」 （C）由「當它漸趨氾濫時，散布者的罪惡感也會相對減少，最大的危機就是造成 民眾對社會產生不信任感，逐步地破壞民主制度。」可知，（C）最恰當。 （D）由「有人利用合成的假影像操弄資訊，進而詐騙牟利、毀人聲譽，製造社會 的動盪，讓這項技術引發爭議。」可知，深偽技術的爭議並非在人類創意會 被人工智慧取代。"}], "has_figure": false, "id": 1}, {"year": "113", "subject": "國文", "qrange": "25-26", "passage": "最近經常想起愛丁堡。\n可能是冬天到了的緣故，我就想起那個寒冷的城市。但想起愛丁堡時，記\n憶幾乎都局限在從宿舍到圖書館的一段路。其他的地方，有時連路名都想不起\n來了。我在那個城市住了三年多，但從離開的那天起，有關它的記憶卻迅速風\n乾縮小，失去細節的厚度。\n在愛丁堡的期間，最常走的一段路，是從宿舍到國家圖書館。有時也會為\n了特定的資料，改去大學總圖或神學院圖書館。我喜歡圖書館，尤其老圖書館\n厚重的木頭桌椅，沉靜的氣氛和古書味。但每天最盼望的還是我給自己訂下的\n休息時間——下午三四點時到對街的大象咖啡館喝咖啡，吃杏仁牛角麵包，看\n報紙。那家咖啡館有一面窗正對著峭壁上的愛丁堡古城。從溫暖嘈雜的咖啡\n館，遠望冷峻的城堡，好像一種提醒。城堡的歷史以千年計，峭壁以萬年計，\n眼下我以時日計算的時間，不過是零頭。\n二十幾歲的時候，人和城市的關係是有目的性的，有了目的就偏頗。你去\n到一個地方，心裡清楚它不是終點，只是為了完成些什麼，然後又收拾行李往\n別處去。例如留學，每個留學生的心裡都有一張時間表，底限是完成學業回家\n的時間——而那往往和獎學金的年限有關。懷著這張時間表生活，每一天都不\n是獨立的日子，「現在」不只是現在，是朝向日後而存在，日子長長地投影在\n未來。\n那是一種生活在他方。只是當時不覺得匆忙，往後回想，才看出其中的風\n塵僕僕。那時我們都還不知道，攜帶著單一的目標去生活是件挂一漏萬的事。\n二十來歲時銳意求知，要到稍晚才學會，那個尖銳的姿態，同時也是狹窄的。\n—— 張惠菁〈冬城〉", "questions": "25. 關於文中的「我」，下列敘述何者最恰當？\n(A)在愛丁堡的期間是帶有目的性的停留\n(B)認為去大象咖啡館是一種偏頗的決定\n(C)因沉浸在老圖書館的氛圍裡而忘卻時間\n(D)討厭愛丁堡的寒冷而不願回想留學時光\n26. 文末「那個尖銳的姿態，同時也是狹窄的。」這句話的意思，最可能是下列何者？\n(A)粗心大意，挂一漏萬的情況一再出現\n(B)年少時個性尖銳，只想處處與人爭鋒\n(C)器量狹小，容不下別人一丁點的錯誤\n(D)眼前只有單一的目標，視野不夠開闊", "length": 556, "unit": "字", "n_q": 2, "answers": [{"q": 25, "answer": "A", "explanation": "（A）文中的「我」在愛丁堡的停留是有特定目的的，這個目的就是完成學業。 （B）作者去圖書館是為了完成學業，但每天最盼望的就是下午三四點到大象咖啡 館喝咖啡，吃杏仁牛角麵包，看報紙，這顯示「我」對這個休息時間充滿期 待和喜愛。因此，屬於作者自我休閒放鬆的一種喘息時光，不符合文中所提 「人和城市的關係是有目的性的，有了目的就偏頗」。 （C）雖然作者喜歡老圖書館的氛圍，但並沒有提到因為沉浸在圖書館而忘記時間， 而且不忘下午三四點到大象咖啡館喝咖啡。 （D）雖然作者提到了愛丁堡的寒冷，但並沒有表現出因為寒冷而不願回想留學時 光，相反，「我」還詳細回憶了在愛丁堡生活的片段。"}, {"q": 26, "answer": "D", "explanation": "（A）這個選項強調的是粗心大意和疏漏，但文中「那個尖銳的姿態」指的是專注 於單一目標，而非粗心大意。因此，這個選項不符合「尖銳」和「狹窄」所 指的集中和專一的態度。 （B）這個選項將「尖銳的姿態」解釋為與人爭鋒，但原文中「尖銳」更多是指專 注於特定目標，而不是與人競爭。因此，這個選項也不符合文中的描述。 （C）這個選項解釋的是心胸狹窄，不能容忍别人的錯誤，但文中的「狹窄」是指 視野狹窄，即只關注單一目標，而不是指無法容忍别人的錯誤。因此，這個 選項不符合文中的意思。 （D）這句話反映了年輕時的「我」在生活中只有單一的目標，導致視野不夠開闊。 這種「尖銳的姿態」指的是年輕時全心投入於追求某一個特定目標，而忽略 了生活中其他的可能性和細節。"}], "has_figure": false, "id": 2}, {"year": "113", "subject": "國文", "qrange": "36-37", "passage": "古阿明昨天在茶園裡畫的作品，郭雲天認為是近一個月以來最好的一幅，也\n是最使他滿意的一幅。\n古阿明畫的是茶蟲。那真是個奇異的幻想世界。在一面圖案化的綠色畫面\n上，各種各樣的大小茶蟲畫得猙獰可怖。此外還有幾個人物——古阿明曾向郭雲天\n說那三個人是姊姊，小弟弟和他自己。茶蟲有的在拼命地啃茶葉，有的在吃畫面上\n的一個人物手裡捧著的飯，有的在吃另一個人物的衣服。古阿明那小小的心靈裡的\n憤恨與恐懼，靠著他那獨特的，大膽的筆觸，毫無遺漏地表露出來。\n郭雲天只有暗嘆的份兒，幾乎沒有提供意見的餘地，因為古阿明一開始作\n畫，就好像已忘了周遭的一切，連他所尊敬的師長在身旁也都似乎渾然忘卻，手不\n停揮地畫下去。直到畫好後，郭雲天才得到機會提出他的修改意見。他指示他哪裡\n的顏色還不夠鮮明，哪一筆線條還要加強。\n事實上，郭雲天的意見也不多。他不忍破壞掉那純潔的心靈裡所流露出來\n的，敏銳得就如電流一般的感覺。甚至他明知畫裡的一條蟲在生卵是錯誤的，也還\n是讓他保持原來的面目。他認為與其改正過來，倒毋寧這個樣子較合他的年歲。", "questions": "36. 根據本文，古阿明想透過畫作表達的意義，最可能是下列何者？\n(A)以茶蟲代表大自然對人類開發的反撲\n(B)以茶蟲象徵政府官員對老百姓的監控\n(C)茶蟲不僅啃食茶葉，也啃食了古阿明一家日常生活所需\n(D)茶蟲為了生存無所不吃，就像古阿明為了學畫多方嘗試\n37. 根據本文，郭雲天對古阿明的畫作意見不多，原因最可能是下列何者？\n(A)希望古阿明能自己發現缺失\n(B)想要保留古阿明特有的創意\n(C)古阿明作畫時太專注，給意見也聽不進去\n(D)古阿明的畫作太完美，無法再提更多建議", "length": 403, "unit": "字", "n_q": 2, "answers": [{"q": 36, "answer": "C", "explanation": "題幹提及古阿明的背景是「貧困茶農家庭」，加上引文提及的「茶蟲有的在拼命 地啃茶葉，有的在吃畫面上的一個人物手裡捧著的飯，有的在吃另一個人物的衣 服。」中的「飯」、「衣服」皆是民生用品可知，茶葉是古阿明一家賴以生存的 經濟來源，茶蟲啃食一家經濟來源，就是啃食一家生活所需，因此（C）最有可能。 （A）引文中並沒有與「人類開發」相關的描述。 （B）引文中並沒有與「政府官員」、「監控」相關的描述。 （D）引文中並沒有提及古阿明多方嘗試學畫的具體行為。"}, {"q": 37, "answer": "B", "explanation": "由引文「事實上，郭雲天的意見也不多。他不忍破壞掉那純潔的心靈裡所流露出 來的，敏銳得就如電流一般的感覺。」可知，（B）最恰當。 （A）引文中並沒有提及郭雲天有這方面的想法。 （C）敘述雖然符合引文，但由引文「他不忍破壞掉那純潔的心靈裡所流露出來的， 敏銳得就如電流一般的感覺。」可知（C）並非是最有可能的原因。 （D）由「他明知畫裡的一條蟲在生卵是錯誤的」可知，古阿明的話做並非完美到 無法再提更多建議。"}], "has_figure": false, "id": 3}, {"year": "113", "subject": "國文", "qrange": "27-28", "passage": "綏夫特《格理弗遊記》（舊譯《格列佛遊記》或《大小人國遊記》）在\n中文世界裡幾乎是人盡皆知的兒童奇幻文學，但在英文世界裡它其實是一部用\n來諷刺人性、英國時政與權貴的作品。原書有四冊，但許多中譯本只有第一、\n二冊的《小人國》、《大人國》，使人無法窺其全貌。\n在原始版本中，小人國國王將三種不同顏色的細絲線：藍、紅、綠，賞賜\n給表演類似凌波舞舞技最佳的三個人。其實不同顏色的絲線，是分別影射當時\n三種頒予爵士的勳章：藍色綬帶的嘉德勳章、紅色綬帶的巴斯勳章、綠色綬帶\n的薊勳章。因為凌波舞高手的筋骨要很柔軟，綏夫特用來影射沒有骨氣的人才\n能得到寵愛、成為高官。但也因為暗示過於明顯，出版商擔心會得罪當道，所\n以在出版時將絲線的顏色改為紫、黃、白。顏色一改，寓意就煙消雲散。\n此外，早期的中文版有誤譯之處。如原書中應指「醫學」一詞，卻被譯者\n翻成「格物學」。所學的內容一變，主人翁船醫的身分也就變了，在長途航行\n中該如何發揮所學令人有些困惑。由此可見，翻譯時被誤解的內容，有時會有\n極大的影響。\n——改寫自中央研究院「研之有物」網站", "questions": "27. 根據本文，出版社把原書絲線的顏色改掉，造成的影響最可能是下列何者？\n(A)失去原本的隱喻，使讀者無法感受作者諷刺的用意\n(B)混淆勳章的配色，使讀者誤解不同貴族的代表顏色\n(C)過度渲染舞蹈的功能，以為是貴族階層流行的風尚\n(D)刻意淡化階級的對立，營造出社會繁榮和諧的假象\n28. 根據本文，關於綏夫特《格理弗遊記》的敘述，下列何者最恰當？\n(A)作者致力於創作兒童奇幻文學作品\n(B)作者以虛構的情節反映現實的醜惡\n(C)早期中文譯者將原書的四冊內容濃縮為兩冊\n(D)早期譯者用「格物學」一詞是為免得罪當道", "length": 388, "unit": "字", "n_q": 2, "answers": [{"q": 27, "answer": "A", "explanation": "（A）文中明確提到，原書中三種顏色的絲線分別影射了當時英國的三種勳章，用 以諷刺那些沒有骨氣、逢迎拍馬的人才能得到寵愛和高官。但出版商為了避 免得罪當權者，將絲線的顏色改成了與勳章無關的顏色，這使得原本的諷刺 意義消失了。因此，改變顏色後，讀者無法感受到作者原本用意的諷刺，失 去了作品的深層隱喻。 （B）文中並未提到讀者會因為顏色的改變而誤解勳章的配色。原文是說改變顏色 使得原本的隱喻消失，並沒有提到讀者會因而混淆勳章的顏色。文章重點在 於隱喻消失，而不是顏色本身的誤解。 （C）文中並未提到顏色的改變會使讀者誤以為舞蹈是貴族階層的流行風尚。文中 提到的是絲線顏色改變後，隱喻失去了效果，而不是讓人誤解舞蹈的功能。 （D）文中並未提到顏色的改變是為了淡化階級對立或營造出社會繁榮和諧的假象。 顏色的改變只是為了避免得罪當道，而這樣的改變使原本的諷刺隱喻失效， 並沒有提及刻意營造和諧假象的目的。"}, {"q": 28, "answer": "B", "explanation": "（A）文中明確指出《格理弗遊記》在中文世界被視為兒童奇幻文學，但在英文世 界裡，它其實是用來諷刺的作品，並非純粹的兒童文學。 （B）根據文中敘述，綏夫特的《格理弗遊記》在英文世界裡是一部用來諷刺人性、 英國時政與權貴的作品，而非單純的兒童奇幻文學。文中指出：「在英文世 界裡它其實是一部用來諷刺人性、英國時政與權貴的作品。」這表明作者通 過虛構的情節來反映現實社會的問題和醜惡。 （C）文中提到的是「許多中譯本只有第一、二冊的《小人國》、《大人國》，使 人無法窺其全貌」，但並未說明這是因為譯者將四冊內容濃縮為兩冊。 （D）文中提到「早期的中文版有誤譯之處。如原書中應指『醫學』一詞，卻被譯 者翻成『格物學』」，但並未提到這是為了避免得罪當道，而是誤譯。"}], "has_figure": false, "id": 4}, {"year": "113", "subject": "國文", "qrange": "29-30", "passage": "1990年代初研究人員設計出一套評估方法，是為了計算出當年度的「地球\n超載日」。今年（2022年）的「地球超載日」在7月28日，代表在這一天，我們\n已經耗盡當年度地球的永續資源，在剩餘的時間裡，都將以透支的方式消耗地\n球資源。據此，養活全世界的人口要1.75個地球的資源才夠。每個國家帶給地球\n的負擔也大不同，如果每個人的生活方式都跟美國人一樣，那2022年地球超載\n日會落在3月13日。\n根據這套方法往回推算1971年，地球超載日是12月 25日，之後就一路提\n前。2000年地球超載日落在9月，2018年起提前到7月。2020年因Covid-19疫情爆\n發，地球超載日曾往後延了三週，但隔年就恢復到疫情前的情況。\n非政府組織世界自然基金會與全球生態足跡網將矛頭指向食品生產系統及\n其龐大的生態足跡：整體來說，地球上超過一半的生物承載力是用來養活人\n類。很大一部分的糧食和原物料是用於畜牧，人們再吃掉這些動物。富裕國家\n應減少肉品消費，如果可以將肉品消費量減半，地球超載日就可以延後17天。\n由於全世界1/3的食物被浪費掉，所以限制食物浪費可將超載日延後13天。\n——改寫自「地球超載日」網站", "questions": "29. 根據本文，關於人類對地球資源的消耗，下列敘述何者最恰當？\n(A)1990年之前，人類並未透支地球資源\n(B)2022年人類耗用的地球資源是前一年的1.75倍\n(C)每年的地球超載日之後，全球資源就會消耗殆盡\n(D)美國人的生活方式比多數國家的人對地球造成更大的負擔\n30. 根據本文，下列何者最可能使地球超載日延後？\n(A)提升畜牧業整體產量\n(B)加強野生動物保育工作\n(C)增加飲食中蔬食的比例\n(D)嚴防Covid-19疫情再爆發", "length": 383, "unit": "字", "n_q": 2, "answers": [{"q": 29, "answer": "D", "explanation": "（A）文中提到1971年的地球超載日是12月25日，這意味著從1971年起，人類 就已經在透支地球資源。 （B）文中說的是「養活全世界的人口要1.75個地球的資源才夠」，這並不是說 2022年的資源消耗是前一年的1.75倍。 （C）文中的意思是從地球超載日之後，人類會開始透支地球資源，而不是說資源 會立刻消耗殆盡。 （D）文中指出：「如果每個人的生活方式都跟美國人一樣，那 2022年地球超載 日會落在3月13日。」這表示美國人的生活方式對地球資源的消耗比其他 國家更大，因此美國人的生活方式對地球造成更大的負擔。"}, {"q": 30, "answer": "C", "explanation": "（A）畜牧業本身對地球資源的消耗很大，提升畜牧業產量只會增加資源的消耗， 進一步加劇地球超載問題。 （B）雖然加強野生動物保育工作對環境保護有益，但文中沒有提到這會直接影響 地球超載日。 （C）文中指出非政府組織世界自然基金會與全球生態足跡網認為食品生產系統及 其龐大的生態足跡是造成地球資源超載的重要原因之一，並提到「富裕國家 應減少肉品消費，如果可以將肉品消費量減半，地球超載日就可以延後 17 天」。這表明增加飲食中蔬食的比例，即減少肉品消費，可以有效延後地球 超載日。 （D）雖然Covid-19疫情曾使地球超載日延後三週，但這是因為疫情導致經濟活 動和資源消耗暫時減少。本文重點在於可持續的飲食和資源管理，而不是疫 情控制。"}], "has_figure": false, "id": 5}, {"year": "113", "subject": "國文", "qrange": "40-42", "passage": "楚人江乙為郢大夫。有入王宮中盜者，令尹以罪乙，請於王而黜之。其母\n往言於王曰：「妾夜亡布八匹，令尹盜之。」王謂母曰：「令尹信盜之，寡人\n不為其富貴而不行法焉。若不盜而誣之，楚國有常法。」母曰：「令尹不身盜\n之也，乃使人盜之。」王曰：「其使人盜奈何？」對曰：「昔孫叔敖之為令尹\n也，道不拾遺，門不閉關，而盜賊自息。今令尹之治也，耳目不明，盜賊公\n行，是故使盜得盜妾之布，是與使人盜何以異也？」王曰：「令尹在上，寇盜\n在下，令尹不知有何罪焉？」\n母曰：「昔日妾之子為郢大夫，有盜王宮中之物者，妾子坐而黜，妾子亦\n豈知之哉？然終坐之。令尹獨何人，而不以是為過也？昔者周武王有言曰：\n『百姓有過，在予一人。』上不明則下不治，相不賢則國不寧。王其察之。」\n——改寫自《列女傳》", "questions": "40. 根據本文，下列文句「」中的字義，何者說明最恰當？\n(A)妾夜「亡」布八匹：損壞\n(B)令尹「信」盜之：隨意\n(C)妾子「坐」而黜：受罰\n(D)王「其」察之：難道\n41. 根據本文，下列關於令尹與楚王的敘述何者最恰當？\n(A)令尹打算偷盜布匹再將罪責嫁禍給他人\n(B)令尹主張楚國盜賊橫行是須正視的問題\n(C)楚王覺得宮中之物被盜應是令尹的責任\n(D)楚王認為不論身分地位都應該遵守法律\n42. 根據本文，江母見楚王的目的最可能是下列何者？\n(A)想要替兒子江乙頂罪\n(B)表達江乙被懲處的不公\n(C)向楚王告發郢大夫的罪行\n(D)建議楚王再用孫叔敖為令尹", "length": 258, "unit": "字", "n_q": 3, "answers": [{"q": 40, "answer": "C", "explanation": "（A）妾夜「亡」布八匹：失去。 （B）令尹「信」盜之：確實、的確、果真。 （D）王「其」察之：可、應該，表示期望。"}, {"q": 41, "answer": "D", "explanation": "（A）由引文「今令尹之治也，耳目不明，盜賊公行，是故使盜得盜妾之布，是與 使人盜何以異也？」可知，郢大夫之母只是認為令尹要為自己治理不當負責， 而非指令尹有犯罪、嫁禍的事實。 （B）引文中並未提及令尹有此主張。 （C）由「令尹在上，寇盜在下，令尹不知有何罪焉？」可知，楚王並不覺得是令 尹的責任。 （D）由引文「令尹信盜之，寡人不為其富貴而不行法焉。」可知，（D）最恰當。"}, {"q": 42, "answer": "B", "explanation": "（A）江母的言論中並未提及要替兒子頂罪。 （C）應是想向楚王告發令尹的罪行。 （D）應是建議楚王歸咎令尹沒有盡責治理的責任。"}], "has_figure": false, "id": 6}, {"year": "113", "subject": "國文", "qrange": "38-39", "passage": "【甲】\n人讀聖人書二三十年，一旦遇事，便與里巷人無異，或有一聽老成語，便\n能終身服膺。豈老成之言過於六經哉？只緣讀書不作有用看故也。大抵看史見\n治則以為治，見亂則以為亂，見一事則止知一事，何取？觀史如身在其中，見\n事之利害、時之禍患，必掩卷自思，使我遇此等事，當作何處之——如此觀\n史，學問亦可以進，智識亦可以高，方為有益。\n——改寫自呂祖謙《東萊集》\n【乙】\n讀書時，須細看古人處一事，接一物，是如何思量？如何氣象？及自己處\n事接物時，又細心將古人比擬。設若古人當此，其措置之法，當是如何？我自\n己任性為之，又當如何？然後自己過錯始見，古人道理始出。斷不可以古人之\n書，與自己處事接物為兩事。\n——《左宗棠全集》", "questions": "38. 下列關於甲、乙二文文句的說明，何者最恰當？\n(A)「一旦遇事，便與里巷人無異」是因書讀得不夠多\n(B)「見一事則止知一事」意謂對事情的理解不夠全面\n(C)「如何氣象」其意是思索今人當前所處的環境氛圍\n(D)「我自己任性為之」意謂今人比古人更加不受拘束\n39. 關於甲、乙二文的說明與比較，下列何者最恰當？\n(A)甲文認為耳熟能詳的淺近道理，更勝於聖賢之言\n(B)乙文以古人處事的標準，評斷自身舉措是否合宜\n(C)二者都認為讀書應活用，不應拘泥於古人的看法\n(D)二者都覺得古人讀書講究方法，比今人更有效率", "length": 245, "unit": "字", "n_q": 2, "answers": [{"q": 38, "answer": "B", "explanation": "（A）「一旦遇事，便與里巷人無異」是因為「讀書不作有用看故也」，也就是沒 有學以致用。 （C）「如何氣象」其意是思索古人當時所處的環境氛圍。 （D）「我自己任性為之」意謂順任、聽憑我的脾氣性情來作為。"}, {"q": 39, "answer": "B", "explanation": "（A）由甲文「豈老成之言過於六經哉？只緣讀書不作有用看故也。」可知，只是 因為沒有將聖賢書融會貫通，才會覺得淺近道理勝於聖賢書。因此甲文應是 認為聖賢書勝於淺近道理。 （B）由乙文「須細看古人處一事，接一物，是如何思量？如何氣象？及自己處事 接物時，又細心將古人比擬。」可知。 （C）二文皆提及觀史時應將假設自己身在古人的情境中，並將自己的選擇與古人 做比較，才能知道自己的缺失，因此應是參考古人的做法，並非認為「不應 拘泥於古人的看法」。 （D）二文皆未提及古人的讀書方法，而是檢討今人的讀書方法。"}], "has_figure": false, "id": 7}, {"year": "113", "subject": "英文", "qrange": "36-39", "passage": "VOICES OF PEOPLE\nIf you want to learn about bringing back extinct animals, reading\nJohn Smith’s Back from the Dead is a good start. But I have to say\nI can’t agree with everything he says.\nEllen Zimmer\nFrom his book, I can see Smith is an advocate of bringing extinct animals back. He\nsays we have lost many animals because we made their living spaces too dirty. He also\nthinks we must do everything we can to bring them back. However, I don’t know how\nmuch time and money we would need to make the world a better place for them, and\nhonestly no one knows if they could actually come back.\nSmith also says that bringing back extinct animals may be good for us. He talks about\nan extinct frog that grew tadpoles in its stomach. Some women’s babies die before they\nare born, and Smith believes bringing back the frog may be an answer to the problem.\nAccording to him, by studying how the tadpoles grow inside the frog’s stomach, we\nmight be able to find new ways to help these women successfully keep their babies. But\nI don’t think things are as easy as Smith thinks. We have spent ten years and millions\nof dollars on this kind of frog, but all we have got are only a few dead frog eggs. If we\ncan’t see a real frog, how can we be sure women will get the help they need?\nDr. Solomon Wang from the Animal Saving Office says the study of bringing back\nextinct animals is “throwing good money after bad.” And he’s right. A lot of hard work\nhas been put into this expensive dream, but we haven’t seen anything come out of it.\nSo should we still keep going down this road?\n extinct 絕種的 tadpole 蝌蚪", "questions": "36. What does it mean when someone is an advocate of something?\n(A) They talk a lot but do little about it.\n(B) They believe it is good and should be done.\n(C) They have had some bad experiences with it.\n(D) They are one of the first people who have done it.\n37. What is special about the extinct frog in Smith’s book?\n(A) It can live in a dirty living space.\n(B) It might help fix a health problem.\n(C) It eats its babies when it cannot find food.\n(D) It is the first extinct animal that people studied.\n38. Why does Ellen Zimmer use the words from Dr. Solomon Wang?\n(A) To start a new topic.\n(B) To share a big dream.\n(C) To make her idea clearer.\n(D) To invite people to take action.\n39. What does Ellen Zimmer most likely think about bringing back extinct animals?\n(A) It is possible.\n likely 可能\n(B) It is dangerous.\n(C) It is not possible.\n(D) It is not dangerous.", "length": 311, "unit": "words", "n_q": 4, "answers": [{"q": 36, "answer": "B", "explanation": ""}, {"q": 37, "answer": "B", "explanation": ""}, {"q": 38, "answer": "C", "explanation": ""}, {"q": 39, "answer": "C", "explanation": ""}], "has_figure": false, "id": 8}, {"year": "113", "subject": "英文", "qrange": "30-32", "passage": "Usually, people visit bookstores to buy books. But those who walk\ninto Cotoha come to see its owner, Chen Bing-Hong. They bring him\nbooks with different problems. Some have lost their covers, some are\nmissing a few pages, and some have pages that are falling out. Chen can\nalways fix the books and make them whole again.\nChen sees himself as a doctor. He says that books, like people, get\nsick and need help. In Taiwan, there are not many “doctors” like him,\nand most of them work for big libraries and museums. If big libraries and\nmuseums are hospitals, Chen’s bookstore is a health center. Big libraries\nand museums fix important old books with serious problems, and Chen\nhelps people with books that have smaller problems. However, the smaller\nsize of the problems doesn’t mean Chen’s job is less important.\nChen gave an example of a science book he once worked on. It was\nvery old and half of its cover was lost. Its owner still wanted to keep it\nbecause it was a gift from a teacher who helped him follow his dream of\nstudying science. When he got his book back, he was very surprised at the\nnew-old book. He felt he was brought back to the days with his teacher.\nSeeing the owner’s smile made Chen happy, because smiles like that are\nwhat his magic is for.", "questions": "30. Why does the writer talk about doctors and a health center in the reading?\n(A) To explain Chen’s services.\n(B) To talk about Chen’s future plans.\n(C) To explain Chen’s love for books.\n(D) To show why bookstores are important.\n31. Why is Chen Bing-Hong’s job important in the example he gave?\n(A) It allows people to get books as gifts.\n(B) It saves people money on new books.\n(C) It gives people hope to follow their dreams.\n(D) It helps people think of special moments in the past.\n32. What is his magic?\n(A) Fixing books.\n(B) Making book owners smile.\n(C) Finding books that are long lost.\n(D) Changing his bookstore into a library.", "length": 235, "unit": "words", "n_q": 3, "answers": [{"q": 30, "answer": "A", "explanation": ""}, {"q": 31, "answer": "D", "explanation": ""}, {"q": 32, "answer": "A", "explanation": ""}], "has_figure": false, "id": 9}, {"year": "113", "subject": "英文", "qrange": "40-43", "passage": "A HISTORY LESSON ON THE PANDEMIC\n2020.10.29\nSince the Covid-19 pandemic started, people have begun “social distancing”—\nkeeping a safe space between you and anyone you don’t live with. Though it\nhas been a very popular topic this year, social distancing 40 . In fact, it was\nwidely used in the U.S. in the flu pandemic in 1918. But how well did it work? The\nAmericans’ experience can tell us whether it really saved lives.\nFrom the picture, we can see that 41 started social distancing earlier than\nthe other three cities. This helped the city keep the number of deaths down. Besides\ntaking early action, keeping the action long enough was also important in fighting\nthe pandemic. The picture shows that Portland and Denver did well in the first few\nweeks. However, both cities 42 , and the numbers of deaths climbed again.\nBut there was one thing Portland did right. The city used several ways of social\ndistancing at the same time to deal with the pandemic. 43 , sick people were kept\naway from healthy ones; schools were closed; public activities were not allowed. All\nthese were useful in keeping people safe.\nThe lessons of the 1918 pandemic bring us hope. While we are still learning to\nfight Covid-19, social distancing may be the best way to get us through the dark days,\nat least for now.\n pandemic （疾病的）大流行 per 每(一)", "questions": "40. (A) is not a new idea\n(B) has not been very useful\n(C) may bring some problems\n(D) is not welcomed by everyone\n41. (A) Portland\n(B) New York\n(C) Denver\n(D) Pittsburgh\n42. (A) had higher numbers of deaths\n(B) stopped social distancing too soon\n(C) began social distancing a second time\n(D) had the most days of social distancing\n43. (A) Also\n(B) At first\n(C) However\n(D) For example", "length": 224, "unit": "words", "n_q": 4, "answers": [{"q": 40, "answer": "A", "explanation": ""}, {"q": 41, "answer": "B", "explanation": ""}, {"q": 42, "answer": "B", "explanation": ""}, {"q": 43, "answer": "D", "explanation": ""}], "has_figure": false, "id": 10}, {"year": "113", "subject": "英文", "qrange": "33-35", "passage": "AA DDeelliicciioouuss SSuurrpprriissee aanndd WWeellccoommee CChhaannggee\nBy Karl Falk, June 1, 2016\nIn Austria, there are not many restaurants like Habibi\n& Hawara. Here you can enjoy Austrian and Syrian\nfood together. Two Austrians, Martin Rohla and\nDavid Kreytenberg, started this yummy plan from\ntheir experience of working with refugees.\nEvery year, thousands of people have to leave\ntheir homes and families because of war in their\ncountries. So many of them go to Austria that some\npeople in the country think they have become a problem. They are afraid refugees\nmay take away their jobs and they don’t feel safe around them, either. But Rohla\nand Kreytenberg would beg to differ: The refugees don’t have to be a problem.\nThey want to help them start a new life. They invited refugees to meetings and\nfound that some of them were cooks back in Syria. So the idea of Habibi & Hawara\nwas born—a restaurant that brings together Austrian and Syrian food. “The two\nworlds far away from each other meet together,” Kreytenberg said.\nBut Rohla and Kreytenberg want to do more than just give the refugees work. They\nwant their best workers to buy the restaurant in the end. They hope that Habibi &\nHawara is not just a one-time plan and that other Austrians will join them and help\nmore refugees.\n refugee 難民 war 戰爭", "questions": "33. According to the reading, why did Rohla and Kreytenberg open Habibi & Hawara?\n(A) To help refugees live better in Austria.\n(B) To collect money to help Syria fight the war.\n(C) To help Austrians learn about the war in Syria.\n(D) To help refugees go back to their home countries.\n34. What can we learn about Habibi & Hawara?\n(A) It was moved from Syria to Austria.\n(B) It may finally be sold to its workers.\n(C) It has cooking classes in Syrian food.\n(D) It is an important meeting place for Syrians.\n35. What does it mean when people beg to differ?\n(A) They do not agree.\n(B) They look different.\n(C) They cannot speak for others.\n(D) They do not notice something.", "length": 223, "unit": "words", "n_q": 3, "answers": [{"q": 33, "answer": "A", "explanation": ""}, {"q": 34, "answer": "B", "explanation": ""}, {"q": 35, "answer": "A", "explanation": ""}], "has_figure": false, "id": 11}, {"year": "113", "subject": "英文", "qrange": "28-29", "passage": "Yan lived a good life in a big house. One day he invited a friend to dinner at his\nhouse. However, on the dinner table there was only one small dish of one small fish.\nThe friend looked quietly at the fish. It was no bigger than a finger.\nThen he asked Yan if he could borrow a lamp.\n“What for?” Yan asked.\n“Well, it’s so dark in here,” the friend said with a dry smile,\n“I can’t see the other delicious dishes you’ve prepared for me.”\nChang kept a lot of ducks and chickens on his farm. One day, his best friend\ncame to visit him. At noon, Chang told his friend that he couldn’t let him stay for lunch\nbecause there wasn’t much food to eat. The friend looked out at Chang’s farm animals\nfor a moment. Then he asked Chang if he had a big knife.\n“Yes, but what for?” Chang asked.\n“I’m thinking about killing the horse I rode here so we’ll\nhave something for lunch,” the friend said.\n“But how are you going to go home without it?”\n“Well, you wouldn’t mind lending me one of your many\nducks or chickens so I can ride it home, would you?”", "questions": "28. What kind of people do Yan’s and Chang’s friends most likely think  likely 可能\nYan and Chang are?\n(A) They enjoy good food.\n(B) They don’t like to share.\n(C) They like to make friends.\n(D) They don’t like new things.\n29. What is it in the second story?\n(A) A big knife.\n(B) The horse.\n(C) Lunch.\n(D) One of Chang’s ducks or chickens.", "length": 213, "unit": "words", "n_q": 2, "answers": [{"q": 28, "answer": "B", "explanation": ""}, {"q": 29, "answer": "B", "explanation": ""}], "has_figure": false, "id": 12}, {"year": "113", "subject": "英文", "qrange": "22-23", "passage": "It was around eight o’clock on Saturday night. Philip was at home with his little\nbrother, Jason. Jason was hungry and kept crying. But Philip couldn’t cook and their\nfather was not home yet because he was working late in the office. So Philip decided to\ntake Jason out for some food.\nHalf an hour later, when they came back home, Philip was surprised to find that their\nfather was talking to the police and a woman outside their house. He didn’t know who\nthe woman was. She looked scared and stood behind the police. Philip’s father was very\nangry and kept shouting, “I didn’t do anything wrong! I forgot my keys and was just\ntrying to get into MY OWN HOUSE!” But the police didn’t believe him until Philip ran\nto them and explained everything.\nThe police told Philip that the woman called 110 when she saw Philip’s father trying\nto get into a house through a window. That was how it all happened.", "questions": "22. Why did Philip go out?\n(A) To meet a woman.\n(B) To look for his father.\n(C) To ask the police for help.\n(D) To buy food for his brother.\n23. Why was Philip’s father angry?\n(A) He forgot his keys.\n(B) The woman was hiding from him.\n(C) The police didn’t believe what he said.\n(D) Philip and his brother went out at night.", "length": 171, "unit": "words", "n_q": 2, "answers": [{"q": 22, "answer": "D", "explanation": ""}, {"q": 23, "answer": "C", "explanation": ""}], "has_figure": false, "id": 13}, {"year": "113", "subject": "社會", "qrange": "52-54", "passage": "1950年代，臺灣電影為配合政府「反共抗俄」政策，政府所屬片廠拍攝的\n電影，幾乎都是配合官方意識形態的政治宣傳工具，而民間則出現以歌仔戲劇\n本與民俗故事為素材，並用閩南語發音的「臺語電影」。1960年代，因政府強\n調社會安定，臺灣電影開啟「健康寫實」風格，主張電影劇情應避免暴露社會\n的黑暗面，呈現人性的光輝，受到當時海內外華人市場的歡迎。在1970年代經\n濟成長之下，愛情、武俠、功夫、喜劇等電影類型，也進一步走入民眾的休閒\n娛樂之中。\n1980年代初期，臺灣電影受到香港電影新浪潮的影響，進入「 臺灣新電\n影」時期。「新電影」發展初期的導演與編劇，在劇本創作上融入鄉土文學的\n題材，拍攝風格以強調自然、寫實為主，在題材的選用上，開始有意識的挑戰\n官方政治禁忌，而受到相關單位的關切。例如「新電影」初期代表作《兒子的\n大玩偶》，在正式上映前，因電影片段中呈現臺北違建林立等有礙政府形象的\n畫面，遭官方施壓要求刪減，此事件後來被稱為「削蘋果事件」。最後借助影\n視記者楊士琪等人的聲援，才使得電影逃過被刪剪的命運。", "questions": "52. 根據上文，「新電影」出現之前的戰後臺灣電影，最不可能播映下列何種劇情？\n(A)中國 明朝年間，來自各路的武功高手在龍門客棧展開激烈戰鬥\n(B)國軍將領對抗日軍時陣亡，蔣中正題字「英烈千秋」表示悼念\n(C)男主角與豪門望族的女兒產生戀情，並捲入家族間的恩怨情仇\n(D)主角因二二八事件遭到軍警處決，留下妻小長期受到政府監視\n53. 根據上文，「新電影」發展之初，最可能以下列何者作為電影題材？\n(A)宣揚政府推行南進政策所帶來的經濟成就\n(B)關注一般農民、勞工等小人物生活中的困頓\n(C)受到美援影響，將美國流行文化作為劇情主軸\n(D)重視原住民文化，發揚原住民族音樂與神話傳說\n54. 上文「削蘋果事件」中，國家企圖限制的人民權利類型，與下列何者最相似？\n(A)對法庭上的被告宣告褫奪公權\n(B)剝奪貪污罪犯應考公職的資格\n(C)禁止過度血腥暴力影像的出版\n(D)要求外國旅客入境應接受審查", "length": 374, "unit": "字", "n_q": 3, "answers": [{"q": 52, "answer": "D", "explanation": "關鍵字：「新電影」出現之前的戰後臺灣電影，最不可能播映。 威權統治時期的臺灣，統治者不允許「二二八事件人民遭到軍警處決」的畫面 議題被公開宣揚或討論。"}, {"q": 53, "answer": "B", "explanation": "關鍵字：「新電影發展初期的導演與編劇，在劇本創作上融入鄉土文學的題 材」。 鄉土文學的融入，使得文藝發展更關心臺灣這塊土地上的「一般老百姓」的生 活。"}, {"q": 54, "answer": "C", "explanation": "與(C)同為言論自由剝奪。 (A)(B)為參政權。 (D)與人身自由或隱私較相關。"}], "has_figure": false, "id": 14}, {"year": "113", "subject": "社會", "qrange": "46-48", "passage": "過去《道路交通管理處罰條例》中的「電動自行車」，僅以電力驅動行\n駛，因與電動機車的使用差異不大，且不須懸掛車牌、不須駕照、駕駛者無年\n齡限制、價格較低廉，部分民眾喜愛以它作為代步工具，卻也衍生諸多問題。\n2022年4月時，政府修正《道路交通管理處罰條例》，將「電動自行車」更\n名為「微型電動二輪車」，加入應領用並懸掛車牌進行管理、投保強制汽車責\n任保險、年滿14歲才能駕駛等規定，違規者將遭主管機關開罰，並於5月4日由\n總統公布。此外，若在修正規定施行前就已持有微型電動二輪車的車主，須在\n施行後的二年內領用並懸掛車牌，逾期亦將受罰。\n由於法規修正後，仍有諸多行政工作需要時間準備，因此政府宣布這些修\n正規定在2022年11月30日才正式施行。", "questions": "46. 根據文中第一段內容判斷，相較於電動機車，部分民眾喜愛使用電動自行車\n的原因，最可能為下列何者？\n(A)該產品的市場競爭程度日漸提升\n(B)選擇使用該項產品的機會成本較低\n(C)受匯率變化影響，產品販售價格調降\n(D)負向誘因增加，民眾使用產品意願提高\n47. 文中政府於2022年4月所做的變革，其過程須經下列哪一程序？\n(A)公民投票複決\n(B)憲法法庭審理\n(C)行政機關移請覆議\n(D)中央立法機關通過\n48. 根據文中內容判斷，在修正規定施行前已持有微型電動二輪車者，關於其領\n用車牌的敘述，下列何者最適當？\n(A)最晚要在2024年5月3日領用車牌，以免遭受行政處罰\n(B)最晚要在2024年5月3日領用車牌，以免遭受刑事處罰\n(C)最晚要在2024年11月29日領用車牌，以免遭受行政處罰\n(D)最晚要在2024年11月29日領用車牌，以免遭受刑事處罰", "length": 262, "unit": "字", "n_q": 3, "answers": [{"q": 46, "answer": "B", "explanation": "題文中「價格較低廉」暗示以其作為交通工具，所需放棄的價金較低，符合機會 成本的概念。"}, {"q": 47, "answer": "D", "explanation": "《道路交通管理處罰條例》為法律，須經中央立法機關通過方能生效。"}, {"q": 48, "answer": "C", "explanation": "修法後兩年內，應以生效的2022年11月30日為準，該條例為行政法，故選(C)。"}], "has_figure": false, "id": 15}, {"year": "113", "subject": "社會", "qrange": "44-45", "passage": "非洲部分地區，有宗教團體灌輸民眾邪靈可能會附身於孩童的觀念，而被\n附身的孩子通常被稱為「巫童」，會為家庭帶來災難、貧困和疾病，信徒對此\n深信不疑。\n巫童的認定由當地宗教人士判斷，一旦被判定為巫童，不論年紀多小，都\n可能會遭遺棄而流落街頭，或由宗教人士向父母收取相當於當地一般家庭一年\n收入的高額費用，為孩子舉行驅魔儀式。在驅魔過程中，父母會被要求凌虐巫\n童，因為宗教人士認為巫童越痛苦、哭喊聲越大，就表示驅魔越成功。\n近年巫童問題受到國際關注，有些志願團體投入宣導及教育相關工作，希\n望藉由知識的推廣改正迷信行為，進而達成保護孩童的目的。", "questions": "44. 文中巫童悲劇的發生，主要反映出下列何種現象？\n(A)文化的差異形成文化位階 (B)法律的強制力高於宗教信仰\n(C)民眾行為會受到社會規範影響 (D)公共意見是經由反覆辯論而形成\n45. 文中關於巫童所受待遇的描述，最能凸顯下列何者的重要性？\n(A)基本人權應受到普遍性的保障 (B)公權力的行使應受到法律約束\n(C)自由信仰宗教的權利應受法律保障 (D)政府的權力應相互制衡以避免濫權", "length": 237, "unit": "字", "n_q": 2, "answers": [{"q": 44, "answer": "C", "explanation": "主要討論當地宗教風俗文化對民眾的影響，是一種社會規範的效果，其中並未有 文化差異或高低位階之比較。"}, {"q": 45, "answer": "A", "explanation": "選項解析：題文未涉及法律政府的政策執行，人權團體的呼籲也並非針對信仰， 而是侵害人權之行為，因此(A)最為適當。"}], "has_figure": false, "id": 16}, {"year": "113", "subject": "社會", "qrange": "49-51", "passage": "根據《美國憲法》，眾議院的435席議員席次是按照各州人口數分配，而每\n10年會依據人口普查結果重新分配席次，且每個州至少有1個席次。圖(二十三)\n為不同年分各州眾議員席次的變化情形，每位眾議員平均代表的美國公民也從\n646,952人變成761,169人。其中，僅有1席的州為圖中標示斜線的區域，而席次\n最多的州皆為加州，在2020年為52席。臺灣現行的區域立委席次分配也採類似\n美國的方式，例如73位區域立委中，臺北市應選出8人，雲林縣應選出2人。\n圖(二十三)", "questions": "49. 根據上文及觀察圖(二十三)中不同年分各州眾議員席次的變化情形，可以推論\n美國人口在這段期間有下列何項變動？\n(A)南部州人口成長速度較東北部的州快\n(B)美國各州持續呈現人口負成長的狀態\n(C)加州因國際移民眾多而人口成長加快\n(D)禁止移民的政策主導德州人口的變化\n50. 影響美國各州人口多寡的因素眾多且不相同，觀察圖(二十三)中2020年眾議院\n席次僅有1席的州，下列何者與這些州人口少的原因較無關聯？\n(A)地形崎嶇\n(B)工業就業機會少\n(C)位居高緯且氣候嚴寒\n(D)深受殖民地式經濟影響\n51. 根據上文並參考圖(二十四)臺灣人口分布狀況，下\n列關於各行政區立委席次分配的說明何者正確？\n(A)屏東縣區域立委席次少於臺東縣\n(B)新北市區域立委席次多於宜蘭縣\n(C)彰化縣區域立委席次為全臺最少\n(D)臺南市區域立委席次為全臺最多", "length": 174, "unit": "字", "n_q": 3, "answers": [{"q": 49, "answer": "A", "explanation": "根據圖二十三，二十年來美國南部有不分州的眾議員席次持續增加，東北部有 些州則持續減少，因此(A)選項敘述合理。 (B)選項，根據文章敘述「每位眾議員平均代表的美國公民也從646,952人變成 761,169人」，因此各州持續呈現人口負成長的說法不合理。 (C)選項的移民情形無法從文章中獲得資訊。 (D)選項，圖中德州的席次一直在增加，代表人口是增加的，無法看出移民禁令 有主導性的影響。"}, {"q": 50, "answer": "D", "explanation": "僅有一席的州皆偏中高緯，不適合發展殖民地式經濟，因此與(D)選項較無關聯 北美的殖民地式經濟主要位於南方地區。 (A)選項中部分一席州位於洛磯山脈區。 (B)東北部一席的州不至於缺乏工業機會。 (C)選項適用於阿拉斯加。"}, {"q": 51, "answer": "B", "explanation": "按人口密度推算人口數。 (A)選項錯誤，屏東縣的席次會多於臺東縣。 (B)選項正確，新北市的席次多於宜蘭縣。 (C)選項錯誤，彰化縣並非人口最少的行政區，席次不會最少。 (D)選項錯誤，臺南市並非人口最多的行政區，因此席次不會最多。"}], "has_figure": true, "id": 17}, {"year": "113", "subject": "自然", "qrange": "49-50", "passage": "工業革命後，因大量使用化石燃料，使得大氣中二氧化碳的濃度逐漸增加。\n圖(二十五)為大氣中二氧化碳濃度隨時間的變化圖，圖中的濃度出現週期性的變化。\n圖(二十五)\n在秋、冬季節，樹葉落到地面腐爛，並以二氧化碳的形式釋放回大氣中。在\n春、夏季節，植物生長並進行旺盛的光合作用，反應式如下：\n因此與秋、冬季節相比，春、夏兩季大氣中的氧氣濃度可能會略有上升，而\n二氧化碳濃度會下降。受季節的影響，二氧化碳濃度大約會增減5～10 ppm，使\n二氧化碳濃度出現2～3%的週期性變化，而氧氣的濃度也會有週期性變化。", "questions": "49. 圖(二十五)中的二氧化碳濃度變化資料，整張圖所呈現的時間範圍約為多久？\n(A) 5個星期\n(B) 5個月\n(C) 5年\n(D) 50年\n50. 文末提及「氧氣的濃度也會有週期性變化」，其變化百分比與理由，下列何者\n最合理？\n(A)因CO 的分子量大於O ，故O 的變化百分比會比2～3%要小很多\n2 2 2\n(B)因CO 的分子量大於O ，故O 的變化百分比會比2～3%要大很多\n2 2 2\n(C)因大氣中O 的濃度比CO 高得多，故O 的變化百分比會比2～3%要小很多\n2 2 2\n(D)因大氣中O 的濃度比CO 高得多，故O 的變化百分比會比2～3%要大很多", "length": 204, "unit": "字", "n_q": 2, "answers": [{"q": 49, "answer": "C", "explanation": ""}, {"q": 50, "answer": "C", "explanation": "量，相較於大氣中的氧氣量要來得少很多；而光合作用消耗的"}], "has_figure": true, "id": 18}, {"year": "113", "subject": "自然", "qrange": "44-45", "passage": "再生能源包括太陽能、風力、水力、地熱、生質能等種類，具有溫室氣體排\n放量低等環境友善優勢，發展再生能源已成為國際趨勢。圖(二十三)為某國2020年\n的發電方式比例圖，表(十二)為燃煤電廠與燃氣電廠的空氣汙染物排放比較。\n該國政府希望未來以能源轉型降低溫室氣體的排放，廢除核能使用、逐年增\n加再生能源比例，並將燃煤發電改採燃氣發電為主，兼顧用電需求與環境保護。\n表(十二)\n圖(二十三)", "questions": "44. 根據本文，下列何者最符合該國政府對未來發電方式的期望？\n（此題選項為圖／表，請見原始試題本）\n45. 根據本文，將燃煤發電改採燃氣發電為主，可達到下列何種目的？\n(A)減少每發一度電時所需耗費的金錢\n(B)減少每發一度電時空氣汙染物的排放\n(C)增加再生能源在整體能源使用的比例\n(D)增加每發一度電時所排放的溫室氣體量", "length": 160, "unit": "字", "n_q": 2, "answers": [{"q": 44, "answer": "A", "explanation": ""}, {"q": 45, "answer": "B", "explanation": ""}], "has_figure": true, "id": 19}, {"year": "113", "subject": "自然", "qrange": "46-48", "passage": "「冷氣時」為當年氣溫超過28℃之時數的累積，統計顯示住宅中用電最多\n的家電為冷氣機，因此訂定冷氣時可以用於了解住宅用電，一般認為冷氣時會\n影響住宅用電多寡，冷氣時增加會使住宅用電增加，減少則使住宅用電減少。\n圖(二十四)為臺灣2017～2021年各年度的「住宅用電」與「冷氣時」，此處冷氣\n時數據為臺灣各地之平均值。而2020年起因受到COVID-19疫情影響，民眾居家\n時間變長，致使住宅用電明顯成長。\n2000\n圖(二十四)", "questions": "46. 根據圖(二十四)，2021年的「住宅用電」可表示為下列何者？\n(A) 2.235 × 1010度 (B) 2.235 × 1011度\n(C) 5.2729 × 1011度 (D) 5.2729 × 1012度\n47. 文中提及「一般認為冷氣時會影響住宅用電多寡，冷氣時增加會使住宅用電\n增加，減少則使住宅用電減少」，下列哪一項數據最符合上述引號中的說\n法？\n(A) 2017～2018年冷氣時與住宅用電的變化情形\n(B) 2020～2021年冷氣時與住宅用電的變化情形\n(C)這五年中，冷氣時最低年分與住宅用電最低年分，兩者的對應關係\n(D)這五年中，冷氣時最高年分與住宅用電最高年分，兩者的對應關係\n48. 文中「冷氣時」選擇以超過28℃的時數計算，其原因可能與下列何者最相關？\n(A) 28℃為臺灣的平均氣溫\n(B)氣溫28℃時冷氣機最耗電\n(C) 28℃以上的氣溫，會讓多數民眾選擇開冷氣機\n(D)冷氣機設定為28℃時，冷房效果最佳最為省電", "length": 158, "unit": "字", "n_q": 3, "answers": [{"q": 46, "answer": "D", "explanation": ""}, {"q": 47, "answer": "A", "explanation": "冷氣時減少則使住宅用電減少，所以冷氣時必須與住宅用電成"}, {"q": 48, "answer": "C", "explanation": ""}], "has_figure": true, "id": 20}, {"year": "113", "subject": "自然", "qrange": "42-43", "passage": "食蛇龜目前在臺灣為保育\n類動物，過去由於中國市場的\n需求，食蛇龜被暗地裡大量運\n往中國而使野外的數量下降。\n國際自然保護聯盟(IUCN)\n為了維護生物多樣性，維持環\n境的穩定，會評估生物的滅絕\n風險。圖(二十二)為IUCN評\n估物種滅絕風險的簡略流程，\n目前食蛇龜被歸類為(EN)物\n種。\n圖(二十二)", "questions": "42. 根據本文，過去食蛇龜曾面臨下列何種問題？\n(A)棲地破壞 (B)環境汙染 (C)過度捕捉 (D)外來種引入\n43. 根據本文，關於食蛇龜在IUCN的分類，下列何者最合理？\n(A)屬於滅絕物種 (B)屬於低風險物種\n(C)屬於未做評估物種 (D)屬於生存受脅物種", "length": 114, "unit": "字", "n_q": 2, "answers": [{"q": 42, "answer": "C", "explanation": ""}, {"q": 43, "answer": "D", "explanation": "推，可知食蛇龜是瀕危物種、生存受脅、未滅絕、有足夠資料"}], "has_figure": true, "id": 21}, {"year": "114", "subject": "國文", "qrange": "29-31", "passage": "【甲】\n電影大師希區考克曾說：「製作一部偉大的電影需要三樣東西：劇本、劇\n本、劇本。」由此可見劇本對電影的重要性。在劇本中，對白固然重要，但劇\n本必須深植於令人感覺真實的世界裡，才能有生命，也才能攫住觀眾。而視覺\n化寫作，就能創造出這個世界來。\n劇本中的視覺化寫作指的是：除了對白之外的所有部分，亦即視覺描述。\n任何試圖藉由文字勾勒出圖像的描寫方式，就是視覺化寫作。視覺化寫作的要\n素有以下四種：\n一、場景外觀：劇中的地點看起來如何？須具體寫出地點的獨特之處。別\n只是說廚房裡有爐子和冰箱，而要說出這個廚房的特色。\n二、場景事件：場景中發生什麼事？火車呼嘯而過？小鳥飛過窗邊？角色\n周遭有什麼正在發生？\n三、角色外貌：劇中角色看起來是整潔體面還是不修邊幅？雙眼有神還是\n疲憊？他們穿的是制服或是便服？劇本作者選擇的視覺細節會透露角色的性格\n及當下的狀態。\n四、角色行動：角色如何行動？當這個角色聽見別人對他說「我愛你」，\n他是低頭沉默或歡喜地跳起來？角色的肢體動作可以反映出他們的心理。\n——改寫自〈視覺化寫作：4個電影劇本範例〉\n【乙】\n室內 安德魯的練習室\n安德魯正在陰暗狹小的練習室裡，試著打出雙跳。在他左前方銀灰色譜架上的\n電子節拍器，正在閃爍，紅色的電子數字顯示目前速度設定在380。\n安德魯停下，重新設定為390。又繼續打擊。試著跟上。再調整節拍器到400。\n現在完全跟不上。全力以赴、汗流浹背、雙手起泡，這時——\n喀啦。安德魯的右鼓棒斷成兩半。\n他停下來。疲憊。看著自己的手。渾身冒汗，雙手發痛。\n回頭看節拍器。仍在嗶嗶作響。他將它關上。\n抬頭看海報中的人物——巴迪．瑞奇俯在鼓上。\n——改寫自電影劇本《進擊的鼓手》", "questions": "29. 根據甲文，關於劇本的創作，下列敘述何者最恰當？\n(A)增加對白的比例可讓電影更有視覺效果\n(B)要看懂電影必須先學習視覺化寫作的技能\n(C)視覺化寫作可讓讀劇本的人較容易掌握情境\n(D)希區考克認為視覺化寫作是劇本最重要的部分\n30. 關於乙劇本的寫作分析，下列何者最恰當？\n(A)透過極簡的對白讓事件留有餘韻\n(B)藉「關上」一詞讓角色間有衝突\n(C)以節拍器故障凸顯角色性格的偏執\n(D)用狀聲詞「喀啦」製造情節的轉折\n31. 乙劇本畫線處的文句，最無法呼應甲文中哪一項視覺化寫作的要素？\n(A)場景外觀\n(B)場景事件\n(C)角色外貌\n(D)角色行動", "length": 586, "unit": "字", "n_q": 3, "answers": [{"q": 29, "answer": "C", "explanation": "(A)甲文強調對白以外的視覺化寫作才是重點。 (B)觀眾看電影不需學視覺化寫作，這是寫劇本者的技巧。 (C)甲文說明「視覺化寫作」的目的就是讓劇本中的世界感覺真實，讓觀眾容易被吸引， 對於讀劇本的人而言，也更容易掌握情境。 (D)希區考克強調的是「劇本的重要性」，沒有特別點名視覺化寫作是最重要部分。"}, {"q": 30, "answer": "D", "explanation": "(A)乙劇本完全沒有對白，是全靠動作與描述推進劇情。 (B)「關上節拍器」是角色獨自動作，與他人無關，也無角色間衝突。 (C)節拍器沒故障，是角色自己不斷調快速度直到跟不上。 (D)「喀啦」是鼓棒斷裂的聲音，標誌轉折點，角色體力到極限，象徵努力也「斷了」， 是重要的情節變化點。"}, {"q": 31, "answer": "C", "explanation": "(A)場景外觀：「陰暗狹小」、「銀灰色譜架」、「紅色數字」等 (B)場景事件：有「打鼓」、「節拍器閃爍」等 (C)角色外貌：沒有描述安德魯外型特徵 (D) 角色行動：「設定節拍器」、「打鼓」、「看手」、「關掉節拍器」"}], "has_figure": false, "id": 22}, {"year": "114", "subject": "國文", "qrange": "25-26", "passage": "高二的外孫跟我說了一顆蛤蜊的故事。\n這蛤蜊竟然有名字，叫「明」。明是隻北極圓蛤，目前已知最長壽的多細\n胞動物，活了超過五百年，科學家推估其出生於明朝，於是命名「明」。孫子\n再三強調：「據說，北極海底，隱藏著比明更老的蛤蜊！」\n我也講了另一種蛤蜊的故事給他聽。\n在外孫這年紀時，我跟著母親上山下海做各種勞動討生活。那個年代，累\n得不得了時，抬頭一看，發現大家都辛苦，也就不會覺得自己特別苦。諸多體\n力活中，我最喜歡到海邊挖「公呆」。\n牠們喜歡成群生活在淺灘，若有動物接近，會一起噴水警示。這樣做或許\n能嚇走水鳥，但正好讓人發現位置，勢眾又跑不快，是不是蛤蜊呆？所以被人\n叫做公「呆」。\n公呆不只呆，還很懶，總是攤平在爛泥表面，只求有層薄土蓋得住殼就好，\n又動不動就噴水虛張聲勢，更容易被發現。撿拾公呆不須花太多力氣，唯一要\n注意的是，公呆殼很薄，文蛤閉殼後像石頭，碰撞也不太會破損，但公呆殼用\n兩根手指一捏就碎裂，所以耙開土的動作要小，輕輕翻開土後再慢慢撿就好。\n「外婆，讓人這樣撿，很快會絕種！」講環保的一代不滿地抗議。\n「你以為所有蛤蜊都像那隻明，能活五百年？公呆本就活不過一年，秋天\n一到，天氣一冷，沒被吃掉，牠們也成群成群死掉，全變成白殼骨。」\n孫子說：「外婆，公呆不是因為懶惰而不潛得更深來保護自己，牠們實在\n是殼太薄，承受不了壓力，才會攤平在淺灘上！反正一輩子也沒多長，一起躺\n好晒晒太陽，還能趁活著時，享受一點溫暖和陪伴。要是像明一樣，活在冰冷\n的北極深海裡，公呆們應該是受不了的。」\n果然在躺平年代裡，更容易理解躺平生物。\n—— 改寫自毓秀〈公呆〉", "questions": "25. 根據本文，下列關於公呆的敘述何者最恰當？\n(A)若移至深海生活，可以延長生命\n(B)噴水嚇阻敵人，反而暴露藏身處\n(C)閉殼後像石頭，碰撞也不易破損\n(D)群體死亡前，會一起躺平晒太陽\n26. 關於本文的寫作分析，下列何者最恰當？\n(A)以祖孫對話暗示不同世代價值觀的差異\n(B)以作者童年拾蛤經驗抒發對親人的懷念\n(C)藉北極圓蛤明彰顯生態永續發展的重要\n(D)藉公呆的形象比喻活到老學到老的態度", "length": 566, "unit": "字", "n_q": 2, "answers": [{"q": 25, "answer": "B", "explanation": "(A)移至深海公呆會被壓碎，因為殼太薄，無法承受壓力。 (B)文中明說「一起噴水警示……正好讓人發現位置」。 (C)這是形容文蛤，不是公呆。公呆「兩指一捏就碎裂」。 (D)沒有「死亡前一起曬太陽」的說法，那是孫子的詮釋，不是生態現象。"}, {"q": 26, "answer": "A", "explanation": "(A)全文透過祖孫對話，一人講「明」、一人講「公呆」，並引發「環保與生存觀」、 「躺平與堅韌」的價值觀差異。 (B)作者童年記憶是為了講「公呆」特性，不是重點放在懷念親人。 (C)文中並未為強調生態永續。 (D)公呆象徵「短暫生命中找溫暖」，不是「活到老學到老」。"}], "has_figure": false, "id": 23}, {"year": "114", "subject": "國文", "qrange": "36-37", "passage": "南唐 後主 李煜跪在明德樓前，白衣素袍，向宋太祖 趙匡胤歸降時，內心肯\n定百感交集。他想過以後的歷史，怎麼寫他嗎？《舊五代史》直接把十國裡凡稱\n帝的都貶為「僭偽列傳」，南唐當然也逃不了。《新五代史》稍稍客氣，但也僅\n以「世家 」定位。《舊五代史》南唐部分只寫到烈主 李昪、中主 李璟，並沒\n有後主 李煜。《新五代史》雖提及李後主，但入宋的部分不寫。\n為何新、舊《五代史》如此定位？這就必須了解中國史家重視傳統王朝興替的\n「正統情結」。趙匡胤是借「陳橋兵變」、「黃袍加身」而當上皇帝，其政權正當\n性，乃繼承北方中原的政權更替。以此史觀來看，唐朝滅亡後在中原相繼更迭的北方\n政權：後梁、後唐、後晉、後漢、後周，便被視為正統，其他政權則被視為僭越。\n然而紛亂的五代十國，主戰場就在北方中原。五代國祚最短的是後漢，三年\n多換了兩個君主。最長的是後梁，十七年四個皇帝。何況，五代王位之爭，經常是\n血腥暴力、骨肉相殘，朝廷難有建樹，更談不上人文建設、經濟民生。\n「君王唯兵強馬壯者得之」，五代帝王幾乎沒幾位是有高度文化修養的。反\n倒是十國裡的南唐前後維持近四十年，只經歷三個皇帝，沒有繼承權的紛亂，政權\n相對穩定。且南唐三位國君都重視文教，珍藏圖書，蒐羅書畫，建立教坊，網羅\n畫師，一時之間南唐成了文化重鎮。宋朝雖然滅了南唐，可是汴京皇城裡的文化資\n產，有多少是來自南唐啊！\n——改寫自蔡詩萍《李後主事件簿》\n\n1.世家：紀傳體史書體例之一，諸侯王傳記的體例為\n「世家」，帝王則為「本紀」", "questions": "36. 關於文中新、舊《五代史》對南唐君主的記載，下列敘述何者最恰當？\n(A)《舊五代史》記錄李昪，是因為認同他的正統地位\n(B)新、舊《五代史》都不肯承認南唐君主的帝王身分\n(C)南唐君主在《舊五代史》的定位比在《新五代史》高\n(D)《新五代史》不承認北方政權，故未提及李後主入宋\n37. 根據本文，下列何者最接近作者的觀點？\n(A)應該重視王朝興替的「正統情結」\n(B)北方政權相對穩定，有利於人文建設\n(C)肯定李氏三代重視文教，對文化的貢獻\n(D)趙匡胤借「陳橋兵變」稱帝，是為僭越", "length": 517, "unit": "字", "n_q": 2, "answers": [{"q": 36, "answer": "B", "explanation": "(A) 《舊五代史》將南唐列為「僭偽」即為不正統 (B)《舊五代史》列為「僭偽」，《新五代史》雖改為「世家」，皆不承認帝王身分 (C)相反，《新五代史》給帝王「世家」定位，高於《舊五代史》的僭偽列傳 (D)《新五代史》還是承認北方正統，只是不寫李煜入宋的部分"}, {"q": 37, "answer": "C", "explanation": "(A 作者說明是史家的「正統情節」造成對南唐的偏見 (B)說五代政權混亂，文化乏善可陳 (C)肯定南唐三代的文化建設與貢獻 (D)趙匡胤「陳橋兵變」是繼承北方中原的政權交替，作者未用「僭越」的說法"}], "has_figure": false, "id": 24}, {"year": "114", "subject": "國文", "qrange": "34-35", "passage": "包裝袋裡的空氣比洋芋片多？盒內的穀片變少了？這都不是你的錯覺，廠商\n這種「價格不變、分量減少」的「縮水式漲價」策略已重出江湖。近來許多商\n品以「偷斤減兩」的方式變相漲價，從衛生紙、早餐穀片到貓罐頭都有。\n某些品牌為了避免顧客看到售價上漲，採用「縮水式漲價」，讓顧客支付\n一樣的價格，但產品內容變少。甚至以更極端的手法「剋扣式漲價」，表面上\n價格不變，產品品質卻下降。\n調查發現，62%受調者表示，如果採用縮水式或剋扣式漲價，他們可能停止\n購買該產品，比單純漲價的反應還激烈。與其再繼續使用蹩腳的漲價方式，一\n些企業選擇走另一條路，比如：推出銅板價格的小包裝新品項，或是用搭售方\n式，讓消費者誤以為買到更便宜的產品。如此一來，消費者不易與原先的價格\n比較，也就緩和了抗拒購買的心理。\n——改寫自《商業周刊》", "questions": "34. 根據本文，下列店家的說明何者最不可能是「縮水式漲價」？\n（此題選項為圖／表，請見原始試題本）\n35. 根據本文，消費者對企業選擇的「另一條路」較不抗拒的原因，最可能是下列\n何者？\n(A)較可感受廠商回饋的誠意\n(B)較符合實際上的使用需求\n(C)較能與同類產品產生區隔\n(D)較難直觀察覺價格的改變", "length": 295, "unit": "字", "n_q": 2, "answers": [{"q": 34, "answer": "A", "explanation": "(A)調漲價格並非是縮水式漲價。 (B)分量減少、價格不變 → 縮水式漲價 (C)「由500c.c.變為400c.c.，價格不變」→ 分量變少，是縮水式漲價 (D)「贈品取消，價格不變」→ 品質或附加價值減少，是縮水式漲價"}, {"q": 35, "answer": "D", "explanation": "(A)誠意非文重點，未提及 (B)使用需求未被提及 (C)產生產品區隔並非文章重點 (D)換成小包裝，較難察覺價格改變"}], "has_figure": true, "id": 25}, {"year": "114", "subject": "國文", "qrange": "27-28", "passage": "灰面鵟鷹是過境臺灣的候鳥。每年十月起，牠們遠從日本、西伯利亞或中國\n東北而來，經過墾丁，前往菲律賓的度冬地，到了三月，再集結北返。\n研究灰面鵟鷹十多年的人員曾經透過無線電追蹤，了解牠們的遷徙路線。春\n季牠們會從度冬地開始北遷，一條路線是從臺灣東南外海的蘭嶼，經過琉球北\n上，回到日本繁殖地。另一條路線則是從臺灣的西岸通過，回到中國東北、北\n韓或日本一帶。位在臺灣中部的八卦山，因為地理位置而成為牠們重要的休息\n站。\n每年春天，成千上萬的灰面鵟鷹從南方來，彰化人稱牠們「南路鷹」。\n八卦山的次生林環境，提供了豐富的食物來源。另外，猛禽遷徙過程依靠氣流\n滑翔，必須利用山脈地形，尋找上升氣流，再提升高度，八卦山正好就提供這\n樣的地理條件。\n——改寫自〈留住八卦驛站〉", "questions": "27. 小原根據本文與圖(一)畫了一張灰面鵟鷹遷徙路線圖，如圖(二)。小嵐認為\n小原在圖中標示的遷徙路線有疏漏和錯誤，他提出了下列說法。對照本文\n後，何者可以成立？\n圖(一)\n圖(二)\n(A)北上的路線應該在臺灣南部出海\n(B)北上的路線少畫了經由蘭嶼的這條\n(C)南下的路線不應該經由墾丁出海\n(D)南下的路線少畫了從中國來的這條\n28. 根據本文，八卦山成為灰面鵟鷹重要休息站的原因，最可能是下列何者？\n(A)林相完整，雨量豐沛 (B)地形獨特，容易識別\n(C)食物豐富，地形適合 (D)氣候溫暖，適合繁殖", "length": 284, "unit": "字", "n_q": 2, "answers": [{"q": 27, "answer": "B", "explanation": "本文明言有兩條「北返」路線： 1. 從蘭嶼經琉球回日本， 2. 從臺灣西岸經中國東北、北韓等地 北上路線完全沒畫到蘭嶼與琉球方向，顯然漏掉了這條路線。"}, {"q": 28, "answer": "C", "explanation": "八卦山「次生林環境，提供豐富的食物來源」、「猛禽遷徙…依靠氣流滑 翔…八卦山正好就提供這樣的地理條件」"}], "has_figure": true, "id": 26}, {"year": "114", "subject": "國文", "qrange": "32-33", "passage": "這個社會非常擔心沒有錢，所以實體化成一個一個「別人」，來問我們現\n在到底賺多少錢，將來能賺多少錢。問這些問題的人未必心裡有個數，知道多\n少錢叫做足夠。他們並不關切生活品質、工作熱忱、自我實現、健康狀態、人\n生信念，這些無形價值能不能在金錢天秤上等價換算，一心只想問出個金額，\n好與其他四處蒐羅而來的金額比大小。巨大的金額令他們心生羨嫉，微薄的金\n額則引發他們的焦慮，並且順手潑溼我們對未來的樂觀盼想。賺錢需要付出的\n代價從來都不便宜，要把「夠」放在哪個金額上，或許很難決定，但是出賣自\n我、夢想、健康、幸福、信念，到了「夠」的時候，沒有人能不說夠。\n——江鵝《俗女養成記》", "questions": "32. 根據本文，那些人不停追問他人到底賺多少錢，其原因最不可能是下列何者？\n(A)對貧窮的恐懼\n(B)對未來想像的單一\n(C)重視良好的生活品質\n(D)認為工作的意義只在金錢\n33. 根據文意脈絡，畫線處文句的涵義，與下列何者最接近？\n(A)充分的實現自我\n(B)不再與他人比較\n(C)賺取足夠的金錢\n(D)犧牲已到達極限", "length": 241, "unit": "字", "n_q": 2, "answers": [{"q": 32, "answer": "C", "explanation": "(A) 於「這個社會非常擔心沒有錢」可見。 (B)他們「只想問出個金額，好與其他金額比大小」，說明其想像狹隘。 (C)文中明確指出這些人不關切生活品質等無形價值。 (D)文中強調這些人不看熱忱與信念，只看金額。"}, {"q": 33, "answer": "D", "explanation": "(A)正向意義，與文中意涵不同。 (B)文中談的是自我耗損的極限。 (C)這句話說的是沒法繼續賺了，不是錢真的夠了。 (D)文中主旨正是「犧牲換錢的極限」，因此不得不喊停。"}], "has_figure": false, "id": 27}, {"year": "114", "subject": "國文", "qrange": "40-42", "passage": "日前令郎訪逮，出手筆並石月屏為贈，捧玩不勝愧喜。比來，數於都下朋\n從處見此屏，觀其天質圓瑩，非刻非繪，如秋高氣清，迥然在望，信乎天地之\n異氣、山澤之殊寶也。素心悅之，無從可得，豈意一旦不煩懇請，坐致握中。\n性本疏野，雅叶 所欲，雖受文錦十純 ，白璧百雙，在光之愚，未為重賜。俗故\n1 2\n忽忽，久不遑修謝，尤增悚懼。令郎注官 甚便，想加慰喜，未期接侍，倍希珍\n厚。\n——改寫自司馬光〈答薛虢州謝石月屏書〉\n\n1.叶：音ㄒㄧㄝˊ，符合\n2.純：計量單位，布帛一段為一純\n3.注官：按照當時的官制授職", "questions": "40. 根據文意脈絡，下列「」中的詞語，何者替換後意義仍相同？\n(A)日前「令郎」訪逮：令尊\n(B)「比來」，數於都下朋從處見此屏：近來\n(C)豈意「一旦」不煩懇請：剎那\n(D)「俗故」忽忽：老友\n41. 關於文中的石月屏，下列敘述何者最恰當？\n(A)若不是薛虢州贈送石月屏，司馬光無從見其真貌\n(B)石月屏雖比文錦、白璧昂貴，但司馬光更重友情\n(C)司馬光初獲石月屏時雖心喜，當下仍堅守節操婉拒\n(D)石月屏自然生成，清氣可見，因此司馬光甚為喜愛\n42. 根據本文，下列何者最可能是司馬光收下石月屏後的反應？\n(A)欲登門回禮，惜薛公務繁忙，擬另擇日造訪\n(B)獲贈禮物，喜出望外，故寫信向薛表達謝意\n(C)受薛贈寶深感有愧，已經備好厚禮回贈致謝\n(D)為辨優劣，邀請好友來家中共同鑑賞石月屏", "length": 184, "unit": "字", "n_q": 3, "answers": [{"q": 40, "answer": "B", "explanation": "(A)「令郎」是對對方兒子的敬稱，「令尊」是對對方父親的敬稱，不能通用 (B)「比來」即近來、近日，語義一致，可替換。 (C)「一旦」此處指「有朝一日、突然有一天」，強調某日發生，「剎那」是極短時間， 屬瞬間，語義不同。 (D)「俗故」意指俗事纏身、日常瑣事，「老友」是朋友，兩詞無關聯。"}, {"q": 41, "answer": "D", "explanation": "(A)文中說「數於都下朋從處見此屏」，表示他早就見過 (B)文中說「雖受文錦十純，白璧百雙，未為重賜」，強調司馬光本性質樸，不重視昂 貴的禮物，但石月屏因為兩人的友情，比錦緞、白玉還更貴重。 (C)文中他是喜出望外地收下，無拒收之意。 (D)文中比喻石月屏「非刻非繪」、「如秋高氣清」、「天地之異氣」，顯示自然天成、 清雅脫俗"}, {"q": 42, "answer": "B", "explanation": "「捧玩不勝愧喜」→ 喜悅與羞愧並存，「俗故忽忽，久不遑修謝，尤增悚懼」→ 因忙 碌未能及時回謝而愧疚，所以才特地寫信表達謝意。 (A)文中未提到登門致謝，無依據 (C)司馬光是因收禮後事務繁忙未即時答謝而有愧，且並未提到已備厚禮 (D)是司馬光曾在友人家見過石月屏，且司馬光並無邀請好友來家中鑑賞 白話：日前令郎來訪，送給我這塊石月屏作為禮物，我拿著它玩賞，感到既愧疚又高 興。最近，我多次在京城的朋友聚會中看見這塊月屏，大家都讚嘆它天然純淨的質地， 既不是刻畫也非繪製，像秋天的天空清澈明朗，遙望就彷彿近在眼前，確實是天地異 氣、山澤珍寶的結晶。我由衷喜愛這件寶物，本來無從得到它，沒想到有一天不用多 次懇求，就能坐擁於手中。我的性情本來樸素隨性，喜歡簡樸的雅致之物。即使得到 文錦十純、白璧百雙這樣的珍寶，對我這個普通人來說，也不算什麼特別重視的禮物。 但因俗事繁忙，長久未及好好致謝，心中愈加忐忑害怕。令郎官途順遂，想必您一定 十分欣慰高興。雖然還未有機會前來拜訪，但我倍加期盼並且格外珍視這段情誼。"}], "has_figure": false, "id": 28}, {"year": "114", "subject": "國文", "qrange": "38-39", "passage": "公子光之父曰吳王 諸樊。諸樊弟三人：次曰餘祭，次曰夷眛，次曰季子札。\n諸樊知季子札賢而不立太子，以次傳三弟，欲卒致國於季子札。諸樊既死，傳\n餘祭。餘祭死，傳夷眛。夷眛死，當傳季子札。季子札逃不肯立，吳人乃立\n夷眛之子僚為王。公子光曰：「使以兄弟次邪，季子當立；必以子乎，則光真\n嫡嗣，當立。」\n——改寫自司馬遷《史記》", "questions": "38. 下列何者最可能是文中人物的親屬關係示意圖？\n39. 根據本文，公子光最無法接受誰擔任吳王？\n(A)餘祭\n(B)夷眛\n(C)季子札\n(D)僚", "length": 125, "unit": "字", "n_q": 2, "answers": [{"q": 38, "answer": "A", "explanation": "吳王諸樊之子公子光。吳王諸樊之弟三人為餘祭、夷眛、季子札。夷眛之子為僚。故 親屬關係圖為A。"}, {"q": 39, "answer": "D", "explanation": "公子光說：「使以兄弟次邪，季子當立；必以子乎，則光真嫡嗣，當立。」也就是說 若按兄弟傳承：季子札該立；若按子嗣傳承：光是正嫡，應該公子光立；但吳人卻立 了夷眛之子僚為王，故公子光最不能接受的是僚當王。"}], "has_figure": false, "id": 29}, {"year": "114", "subject": "英文", "qrange": "38-43", "passage": "Most kids want gifts from their parents on their birthdays, but Cameron doesn’t. On his\nbirthday, he gives his mom a gift. He 38 doing this in his first year of junior high\nschool. That year, during one class, he watched a video about how a baby is pushed from its\nmother’s body. After class, 39 . How brave a woman is to have a baby! Thank God I’ll\nnever have to do that!\nWhen Cameron came home that day, he held his mom in his arms for a long time. He\ndecided that his birthday 40 . During those nine months inside his mom, he just ate and\nslept while his mom was doing all the hard work. So why should he get a birthday gift for\ndoing nothing? If anyone should get a gift on his birthday, it should be his mom.\nThe 41 “birthday gift” Cameron prepared was a bag of cookies he baked. The cookies\ntasted so bad, but his mom said they were the best thing she ever got. Hearing that 42 .\nIt was so much better than getting a gift. Now, on his birthday every year, Cameron makes\na gift for his mother to thank her for giving him life.\nThis year, Cameron 43 his mom a nice dress. A few months ago, he learned to make\ndresses at school and decided to make one for his mom. Now the dress is finished and\nhanging behind Cameron’s bedroom door. He believes the gift will tell his mother how\nmuch he loves her.", "questions": "38. (A) starts (B) started (C) has started (D) will start\n39. (A) he got quite scared of two things\n(B) he still couldn’t understand two things\n(C) he couldn’t stop thinking about two things\n(D) he did two things that would change his life\n40. (A) should be spent helping his mom\n(B) should be a time of welcoming a new start\n(C) should not be about him, but about his mom\n(D) should not be celebrated for just one day, but for nine months\n41. (A) first (B) last (C) only (D) other\n42. (A) made his head hurt (B) made his heart sing\n(C) made him change his mind (D) made him give up baking\n43. (A) is going to give (B) gives (C) has given (D) gave", "length": 254, "unit": "words", "n_q": 6, "answers": [{"q": 38, "answer": "B", "explanation": ""}, {"q": 39, "answer": "C", "explanation": ""}, {"q": 40, "answer": "C", "explanation": ""}, {"q": 41, "answer": "A", "explanation": ""}, {"q": 42, "answer": "B", "explanation": ""}, {"q": 43, "answer": "A", "explanation": ""}], "has_figure": false, "id": 30}, {"year": "114", "subject": "英文", "qrange": "35-37", "passage": "In the picture is a UK electricity worker in the 1970s. Pictures like this appeared in\nmany newspapers at the time. In 1972, electricity workers in the UK asked to be paid more,\nand they decided to stop working until their wish was answered. The government worried\nthat there wouldn’t be enough electricity for the country if these workers didn’t go to work,\nso it agreed to give them the pay rise. However, the story didn’t end there.\nA year later, the electricity workers asked for another pay rise. To get what they\nwanted, they worked shorter hours and acted like they would walk away from their job\nanytime. But this time, the government decided to fight. To save electricity, it made new\nrules for people to follow. For example, each family could turn on the heat in only one\nroom; TV stations had to stop their shows at 10:30 p.m.; businesses could open only three\ndays a week.\nPeople’s lives were greatly changed. Without enough heat to keep the house warm,\npeople covered themselves in blankets all the time. Hospitals had to use candles because\nthey couldn’t keep all the lights on. Factories couldn’t keep their machines working. Many\npeople lost their jobs. For months, people were paying the price while the electricity\nworkers were fighting for their wish. In the end, the government agreed to the second pay\nrise. This picture shows what many people thought of the electricity workers during the\n“dark” time.\n electricity 電力 government 政府", "questions": "35. What is the reading mainly about?\n(A) The tips on using a picture to tell a story.\n(B) The change that electricity brought to people’s lives.\n(C) The history behind the picture of a UK electricity worker.\n(D) The story of a famous UK electricity worker from the 1970s.\n36. In the UK in the 1970s, what did people most likely think of the UK electricity workers?\n(A) They were not brave enough to fix their problems.\n likely 可能\n(B) They worked like robots and never learned to change.\n(C) They were asking too much and did not know when to stop.\n(D) They did not care whether their job might hurt people’s health.\n37. Why does the writer put the “ ” mark around the word dark in the last sentence?\n(A) To say that the “dark” time was actually not dark.\n(B) To tell people that the word was said by the government.\n(C) To mean both the days without lights and the difficult lives people lived.\n(D) To show that the government and the electricity workers both lost their fights.", "length": 253, "unit": "words", "n_q": 3, "answers": [{"q": 35, "answer": "C", "explanation": ""}, {"q": 36, "answer": "C", "explanation": ""}, {"q": 37, "answer": "C", "explanation": ""}], "has_figure": false, "id": 31}, {"year": "114", "subject": "英文", "qrange": "32-34", "passage": "Many years ago, Dan Ariely bought a cabinet from IKEA. IKEA is a\nfamous furniture store that sells boxes of furniture parts. People who\nbuy them have to put all the parts together themselves. It took Ariely hours to build\nhis cabinet. Ariely didn’t really enjoy himself when he was trying to put all the parts\ntogether. However, after he finished, he felt quite good about himself and his cabinet.\nLater, he found that he loved his cabinet more than any of his other furniture.\nAriely wanted to know if anyone shared his feelings, so he did\na fun origami study. He invited two groups of people to join his\nstudy. He called one group “builders” and the other group “buyers.”\nBuilders were told to make origami, like paper frogs or paper birds. When they\nfinished, they were asked how much they would spend on their works. Ariely then\nshowed the origami to buyers and asked them how much they would pay for them.\nThe two groups gave very different answers. Though buyers would pay only five\ncents for builders’ origami, builders would spend 25 cents! Interestingly, builders\nbelieved others would think their works were good enough to cost that much money!\nAriely’s study showed that he was not alone in his IKEA experience — we just love\nthings more, sometimes blindly, when we make them ourselves. Ariely called it “the\nIKEA effect.”\n effect 效應 furniture 家具", "questions": "32. What did Ariely try to find out in the origami study?\n(A) If he could stop the IKEA effect.\n(B) Why people love making origami.\n(C) Why IKEA furniture is so famous.\n(D) If anyone shared his IKEA experience.\n33. Which is true about the origami study?\n(A) Buyers would spend less on builders’ origami than builders would.\n(B) Builders and buyers needed to decide a price on the origami they made.\n(C) Builders knew others would not pay as much for the origami as they would.\n(D) Buyers would spend more on builders’ origami after knowing how they were made.\n34. Jerry just can’t get his daughter Mia to eat more vegetables at dinner. Every time he tries\nto do so, there is always a lot of shouting and crying. If Jerry wants to have Mia eat more\nvegetables by using the IKEA effect, what should he do?\n(A) Tell Mia that he cooks the vegetables just for her.\n(B) Ask Mia to help him cook vegetables for her meal.\n(C) Give Mia her favorite candy after she eats vegetables.\n(D) Ask Mia what vegetables she likes and cook them for her.", "length": 235, "unit": "words", "n_q": 3, "answers": [{"q": 32, "answer": "D", "explanation": ""}, {"q": 33, "answer": "A", "explanation": ""}, {"q": 34, "answer": "B", "explanation": ""}], "has_figure": false, "id": 32}, {"year": "114", "subject": "英文", "qrange": "26-28", "passage": "At 5 o’clock every morning, while most people are sleeping,\n16-year-old Libby Larson is already up. She mops the floor, gets\nthe mail and the newspapers, and gets ready for visitors to Rolling\nAcres. Libby’s grandparents started Rolling Acres in 1970, and\nsince then all of the Larson family have been working there.\nRolling Acres used to be just a sheep farm, but now, with its fruit\ntrees, vegetable gardens, and many other kinds of animals, it has\nbecome a popular place for families to go on vacation. Visitors can\npick fruits, collect eggs, and feed the animals. It is one of Libby’s\njobs to show kids how to feed the baby sheep.\nFor her work, Libby is paid $10 an hour. This summer, she expects to make about $1,200\nand plans to buy a cell phone. Her friends think it’s great to make that much money in a\nsummer. However, for Libby, working at a family business also means making sacrifices.\n“I’d love to sleep until noon or go to summer camp like other kids. My friends stopped\ninviting me on trips because I’m always busy in the summer.” However, Libby also said,\n“But it’s better to see both sides. Working with your family is great. You feel closer to\neach other.”", "questions": "26. What is Rolling Acres?\n(A) A zoo.\n(B) A campground.\n(C) A vacation farm.\n(D) A family restaurant.\n27. What do we learn from the first paragraph?  paragraph 段落\n(A) What Libby does at Rolling Acres.\n(B) What visitors think of Rolling Acres.\n(C) Why Libby’s grandparents started Rolling Acres.\n(D) What the Larson family’s plans are for Rolling Acres.\n28. What does making sacrifices mean?\n(A) Learning to make money and use it wisely.\n(B) Getting to know different sides of your family.\n(C) Making excuses for failing to do something difficult.\n(D) Giving up something important to do something else.", "length": 216, "unit": "words", "n_q": 3, "answers": [{"q": 26, "answer": "C", "explanation": ""}, {"q": 27, "answer": "A", "explanation": ""}, {"q": 28, "answer": "D", "explanation": ""}], "has_figure": false, "id": 33}, {"year": "114", "subject": "英文", "qrange": "29-31", "passage": "Around the year 400, people came to Easter Island.\nSo many trees here!\nIn their free time, they loved\nThey used trees to make fire and making statues with big rocks. With\nbuild houses. Because of the trees, the trees they cut down, they could\npeople had a great life on the island. move the statues around easily.\nTrees were needed and used in every part of their life.\nYears passed, and there were fewer and fewer trees on Easter Island.\nWithout enough trees to keep\nAnd I’m hungry.\nwater under the ground, the land\nI’m thirsty.\nbecame dry, and plants didn’t grow.\nPeople began to fight for water and food. The statues were moved to fighting\ngrounds to show their power. The last trees were probably cut down at this time.\nLet’s not make Earth, our only home,\nThose who cut down\nanother Easter Island.\nthe last trees surely\nunderstood how\nimportant trees were\nto them—but still,\nthey did it. When the\nlast trees fell to the\nground, people on the\nisland fell, too.", "questions": "29. What do the comics tell us?\n(A) Enjoy life while we can.\n(B) Follow the old ways of life.\n(C) Save our planet before it’s too late.\n(D) Treat others the way we want to be treated.\n30. What can we learn about the people in the comics?\n(A) They made fire before starting a fight.\n(B) They fought for land and plants all the time.\n(C) They prayed to the statues beside a large fire.\n(D) They used statues to show how strong they were.\n31. What does did it in Picture 7 mean?\n(A) Fall to the ground.\n(B) Cut down the last trees.\n(C) Move the statues to fighting grounds.\n(D) Understand how important trees were.", "length": 179, "unit": "words", "n_q": 3, "answers": [{"q": 29, "answer": "C", "explanation": ""}, {"q": 30, "answer": "D", "explanation": ""}, {"q": 31, "answer": "B", "explanation": ""}], "has_figure": false, "id": 34}, {"year": "114", "subject": "英文", "qrange": "20-21", "passage": "Rex is a dog that lives at the bakery next to our school. He is cute and friendly.\nEvery morning, he stands in front of the school to welcome everybody. We all see Rex\nas one of us. But one Monday morning, I was surprised that Rex was not there to say\nhello to us. “Rex is in the hospital. He was hit by a car last night,” my classmate told me.\nWe went to see Rex in the hospital that day after school. Two weeks later, Rex was much\nbetter, and we decided to take him for a walk every evening. Because of the exercise, Rex\nbecame healthier and stronger. Soon he could happily run and jump again. He is now as\nhandsome and strong as before!", "questions": "20. What happened to Rex?\n(A) He got lost.\n(B) He got hurt.\n(C) He bit people.\n(D) He ate too much.\n21. How did the writer help Rex?\n(A) By calling the police.\n(B) By making him exercise.\n(C) By taking him to see a doctor.\n(D) By looking for a new home for him.", "length": 128, "unit": "words", "n_q": 2, "answers": [{"q": 20, "answer": "B", "explanation": ""}, {"q": 21, "answer": "B", "explanation": ""}], "has_figure": false, "id": 35}, {"year": "114", "subject": "英文", "qrange": "24-25", "passage": "Buy a White Lake City Card When You’re in the City\n With any of the Cards, you can\n- visit the city by metro, bus, or train as many times as you want. *\n- take one child under 12 with you for free.\n- save 20% on tickets to public museums.\n The 1-day, 3-day, and 5-day Cards are for trips from Monday to Friday, and the\nWeekend Card is for trips on weekends and holidays.\n Check the map and buy the right Card for the zones you’ll be entering.\nCard Zone 1 Zones 1-2 Zones 1-3\n1-day\n3-day\n$20 $40 $60\n5-day\n$40 $60 $80\nWeekend\n$50 $80 $110\n* The Cards are only for trips inside the three zones.\n$30 $50 $80\nⓐ White Lake Main Station\nⓑ Museum of White Lake City History\nⓒ Museum of Modern Art\nⓓ White Lake\nⓔ White Lake Castle\nⓕ White Lake Airport\n zone 區", "questions": "24. What can you do with a White Lake City Card?\n(A) Save 20% on children’s train tickets.\n(B) Visit any public museum in the city for free.\n(C) Take a train to places out of the three zones.\n(D) Move around the city by metro as much as you want.\n25. Stacy is going to White Lake City and is staying at a hotel near the White Lake Main\nStation. She wants to visit the Museum of White Lake City History on Friday and see\nWhite Lake on Saturday. If she plans to buy (a) White Lake City Card(s), which of the four\nchoices will be best for her and cost her the least?\n(A) A 3-day Card for Zone 1.\n(B) A Weekend Card for Zones 1-3.\n(C) A 1-day Card for Zone 1 and a Weekend Card for Zones 1-2.\n(D) A 1-day Card for Zones 1-2 and a Weekend Card for Zones 1-2.", "length": 127, "unit": "words", "n_q": 2, "answers": [{"q": 24, "answer": "D", "explanation": ""}, {"q": 25, "answer": "C", "explanation": ""}], "has_figure": false, "id": 36}, {"year": "114", "subject": "社會", "qrange": "49-51", "passage": "巴斯人的祖先原本居住於伊朗高原一帶，七世紀上半葉，阿拉伯軍隊擊敗\n統治當地的薩珊王朝國王伊嗣俟，不願被穆斯林統治的人們遠離故鄉，遷徙至\n印度半島西部避難。此後數個世紀，伊斯蘭教勢力逐漸進入印度，但印度的穆\n斯林統治者對於不同的宗教和文化，表現出較為寬容的態度。這使巴斯人得以\n在印度從事貿易等行業，並世代信仰發源於伊朗高原的宗教。\n十七世紀後期，善於經商的巴斯人，開始與歐\n洲商人合作，既促進印度西部城市孟買等地的繁\n榮，也使得巴斯人隨著歐洲商人來到中國進行貿\n易。十八世紀後期至十九世紀中期，巴斯商人在歐\n洲殖民勢力對中國的貿易網絡之中，扮演重要角\n色，並與控制印度的殖民者一起在中國活動。當時\n巴斯商人留下許多會館與墓園，圖(二十)墓碑即為\n一例。 圖(二十)\n十九世紀中期以後，因為美國內戰導致紡織業原料短缺，以及蘇伊士運河\n開通促進航運事業發展等影響，巴斯商人傾向加強投資印度和歐洲的產業，而\n對中國的商貿占比則逐漸下降。", "questions": "49. 巴斯人的宗教信仰，最可能是下列何者？\n(A)祆教\n(B)佛教\n(C)猶太教\n(D)基督教\n50. 十九世紀上半葉，巴斯人與中國商人的主要貿易模式，最可能是下列何者？\n(A)巴斯人賣瓷器到中國以換取茶葉\n(B)巴斯人賣鴉片到中國以取得白銀\n(C)巴斯人賣鹿皮到中國以獲得棉花\n(D)巴斯人賣茶葉到中國以交換工業品\n51. 關於圖(二十)墓碑文字的解讀，下列何者最適當？\n(A)當時類似的巴斯墓葬，多集中於今日山東 青島一帶\n(B)根據時間可確認，此人於《南京條約》簽訂前來華\n(C)此人為孟買出身，顯示其生前主要與日本商行合作\n(D)碑刻的紀年方式，反映巴斯人珍視薩珊王朝的歷史", "length": 368, "unit": "字", "n_q": 3, "answers": [{"q": 49, "answer": "A", "explanation": "題文提及「巴斯人的祖先原本居住於伊朗高原一帶」，故其信奉之宗教極有可 能為源於伊朗高原一帶的宗教(祆教)。佛教源於印度、猶太教及基督教源於迦薩走廊 一帶。"}, {"q": 50, "answer": "B", "explanation": "瓷器、茶葉原產於中國，故不需要進口至中國。中國對鹿皮需求量不大，故敘 述亦不正確。十九世紀上半葉(1840年以前)，中國對鴉片需求量大，因此走私盛行， 甚至導致白銀開始大量外流，進而爆發後續一連串的鴉片戰爭、英法聯軍之役等東西 貿易軍事衝突。"}, {"q": 51, "answer": "D", "explanation": "從圖(二十)墓碑文字中可知，此人應於鴉片戰爭前、後一帶時來到中國，因此， 無法斷定為鴉片戰爭前就來華，故(B)未必正確。鴉片戰爭前、後時期的外商僅限活動 於華南一帶，故(A)敘述有誤。此人欲與中國貿易，因此合作對象可能為中國漢商或在 印度統治的英國人，因此(C) 敘述有誤。"}], "has_figure": true, "id": 37}, {"year": "114", "subject": "社會", "qrange": "46-48", "passage": "我國現行汽、機車車牌號碼的編碼規則，原則上每組號碼皆是由英文字母與\n阿拉伯數字組成，但在民意反應及諸多考量下，有些數字、英文字母或是特定組\n合，已不再使用於新發放的車牌。例如：數字的「4」，是因為其發音與「死」字\n相近，一般民眾認為觸霉頭而不願使用；英文字母的「I」、「O」不再被使用，\n是因為與數字「1」、「0」太相似；至於BAD、BUM、END等，則由於字母組合\n具有負面意涵，因此也加以排除。\n除此之外，政府也開放民眾可額外付費選擇號碼，有些民眾會想要擁有\n6666、8888、9999等特殊號碼的車牌，因此這些號碼的價格常遠高於其他車牌；也\n有另一些民眾只對與生日、特殊紀念日有關的號碼組合有興趣，因此選擇購買這\n些特定號碼。至於不在意車牌號碼的民眾，則可接受政府發放一般組合的車牌，\n無需額外支付選號費。但不論最後是選擇哪一個車牌號碼，汽、機車所有人都要\n將車牌懸掛在指定位置，違規者將被警察依《道路交通管理處罰條例》開罰。", "questions": "46. 多數國家使用0～9這十個數字作為車牌編碼的組合，但我國僅使用其中九個\n數字。根據文中內容判斷，其原因最可能為下列何者？\n(A)倫理價值具有約束力\n(B)民間習俗具有強制力\n(C)法律規定受宗教信仰影響\n(D)政府施政受社會規範影響\n47. 文中關於民眾選擇車牌號碼的敘述，最適合用來說明下列哪一觀點？\n(A)廠商之間的價格競爭將使消費者受惠\n(B)市場的競爭程度越高對消費者越有利\n(C)負向誘因促使民眾的行為發生改變\n(D)不同人對同一誘因的感受有所不同\n48. 某民眾的車牌被別人惡意拔走，導致他違反文末所述的規定而受罰。若該民\n眾對此處罰不服，依法採行下列何種處理方式最適當？\n(A)向中央立法機關提出訴願\n(B)向地方行政機關提出請願\n(C)透過行政救濟途徑維護權益\n(D)透過刑事訴訟途徑維護權益", "length": 330, "unit": "字", "n_q": 3, "answers": [{"q": 46, "answer": "D", "explanation": "文中明說「數字4發音與『死』相近，民眾認為觸霉頭不願使用」，因此政府 因應社會觀感將其排除。這是典型的政府因應社會風俗習慣、價值觀所做的政策調整， 屬於「社會規範影響政府施政」，而不是法律、宗教、強制力或倫理價值的直接介入。"}, {"q": 47, "answer": "D", "explanation": "有些人偏好數字「8888」願意付高價，有些人則重視「生日號碼」，而有些人 完全不在意車牌號碼。這代表：相同誘因（如選號機制、付費選號），對不同民眾產 生的吸引力或價值判斷不同。"}, {"q": 48, "answer": "C", "explanation": "這是因違反《道路交通管理處罰條例》而受罰，屬於行政處分。若民眾認為受 罰不合理，可依法提出訴願或行政訴訟，這整體過程稱為「行政救濟」。"}], "has_figure": false, "id": 38}, {"year": "114", "subject": "社會", "qrange": "52-54", "passage": "坐落在南大西洋的南喬治亞島，其\n位置如圖(二十一)所示。冰天雪地的環\n境下，島上仍孕育了為數眾多的海獅、\n象鼻海豹、國王企鵝和特有種鳥類。\n1775年庫克船長登島後，宣布其為\n英國領土並以當時的英王命名。二十\n世紀初該島設有數個捕鯨站，目前皆\n已廢棄。1927年，鄰近該島的甲國聲稱\n擁有該島主權，此領土紛爭成為日後\n與英國爆發戰爭的原因之一，1982年戰\n爭結束後，該島仍為英國所管轄。目\n圖(二十一)\n前該島幾乎沒有常住人口，為觀光船\n行程的中繼站。\n2017年，一座面積約4,200平方公里的龐大冰山，脫離陸地後持續在海上漂\n流，圖(二十一)顯示該冰山於不同時間的位置。該冰山雖然持續崩裂、融化，但\n仍相當巨大，2020年科學家依據過去其他冰山漂流的軌跡，推測它極有可能撞\n上南喬治亞島，並研判可能產生的影響。", "questions": "52. 根據圖(二十一)中的資訊判斷，與英國產生領土紛爭的國家應為下列何者？\n(A)南非\n(B)澳洲\n(C)阿根廷\n(D)紐西蘭\n53. 依據上文及圖(二十一)中的資訊判斷，該冰山漂流的方向應為下列何者？\n(A)東北向西南\n(B)西南向東北\n(C)東南向西北\n(D)西北向東南\n54. 上述冰山若撞上南喬治亞島，其產生的影響最可能為下列何者？\n(A)巨浪侵襲島嶼陸地，阻礙工業發展\n(B)附近海水鹽度上升，改變海洋生態\n(C)威脅北美洲與非洲之間的船隻安全\n(D)島嶼海岸遭受破壞，危及動物棲地", "length": 283, "unit": "字", "n_q": 3, "answers": [{"q": 52, "answer": "C", "explanation": "「鄰近該島的甲國」是位於南美洲最南端的國家，可能是智利或阿根廷，其中 面臨大西洋的是阿根廷，因此答案為(C)。 (A)、(B)、(D)主要位於東半球。"}, {"q": 53, "answer": "B", "explanation": "根據圖中經緯度顯示，冰山移動方向為由南往北、由西往東，因此答案為(B)西 南向東北。"}, {"q": 54, "answer": "D", "explanation": "南喬治亞島是重要動物棲息地，冰山撞擊南喬治亞島，可能破壞島嶼的海岸地 形與生態，因此答案選(D)島嶼海岸遭受破壞，危及動物棲地。 (A)南喬治亞島的目前沒有觀光業以外的經濟活動。(B)冰山融化會降低附近海水的鹽 度。(C)南喬治亞島位於南大西洋，離北美洲很遠且需經過熱帶。"}], "has_figure": true, "id": 39}, {"year": "114", "subject": "社會", "qrange": "43-45", "passage": "位於墨西哥首都的國立人類學博物館，館藏以當地古文明的文物為主，大約\n有六十萬件。博物館的建築設計，呼應該地古文明信仰中的四種自然力量：風、\n火、水、土元素，充滿與大自然的共融感。\n一樓的展示廳為常設展，其中一塊區域專門展示當\n地古文明的農業。由於農業發展與宗教神話有密不可分\n的關係，因此展覽廳特別展示了保佑農業生產的神官雕\n像，如圖(十九)所示。神官雕像手中握著的物品，是原\n產於美洲的作物，也是當地古文明所倚重的主食。\n雖然博物館的收藏相當豐富，但在展品的說明上，\n受過去殖民歷史影響，大多僅採用今日當地的官方語\n文。若改善上述不足之處，勢必能造福更多到館參觀的\n外國旅客，增進對當地文化的了解。\n圖(十九)", "questions": "43. 下列何項展品，最可能屬於該博物館的主要館藏？\n（此題選項為圖／表，請見原始試題本）\n44. 圖(十九)神官雕像手中所持的物品，最可能是下列何者？\n(A)玉米 (B)橄欖 (C)小麥 (D)稻米\n45. 文中博物館的展品說明，最可能以何種語文為主？\n(A)英文 (B)法文 (C)葡萄牙文 (D)西班牙文", "length": 265, "unit": "字", "n_q": 3, "answers": [{"q": 43, "answer": "B", "explanation": "巴比倫為西亞古文明、南島語族文化落於東南亞及臺灣與澳洲一帶。因紐特文 化位於北極區附近一帶。阿茲提克文明為中、南美洲古文明。"}, {"q": 44, "answer": "A", "explanation": "原產於中、南美洲者為玉米。橄欖原產於環地中海地區、小麥原產於西亞、水 稻原產於東亞。"}, {"q": 45, "answer": "D", "explanation": "墨西哥曾為西班牙殖民地，故其官方語言為西班牙文。"}], "has_figure": true, "id": 40}, {"year": "114", "subject": "自然", "qrange": "43-44", "passage": "綠蒜頭是一種醃漬食品，一般做法約20天可使蒜頭變綠色。陳同學想要探究\n影響蒜頭變綠色的原因，進行的實驗與說明如下：\n蒜頭燒杯：先將蒜頭剝皮後，選取大小相近的蒜頭每6顆放入一個燒杯，共數杯。\n實實驗驗一一：在數個蒜頭燒杯中各倒入15.0 mL食醋，杯口封膜後置於10℃的低溫環境存\n放，每天記錄蒜頭的「變色比例」。\n變色的蒜頭數量\n變色比例＝ ×100%\n全部的蒜頭數量\n結果發現到第6天有6%蒜頭開始變綠色，直到第15天，所有蒜頭全部開始\n變綠色。\n實實驗驗二二：因為全部變色的時間較長，所以陳同學改變存放蒜頭燒杯的溫度，步驟\n如下：\n1. 在數個蒜頭燒杯中各倒入15.0 mL食醋，杯口封膜。\n_\n2. 分別置於三種溫度環境( 13℃、10℃、25℃)，存放3天。\n3. 由於蒜頭皆無變色，所以全部改置於25℃的環境繼續存放，於第5天時，\n變色比例如表(十)。\n表(十)\n實實驗驗三三：根據實驗一、二的結果，陳同學設計實驗三，探究蒜頭置於不同水溶液\n後變綠色的變因。步驟如下：\n1. 在數個蒜頭燒杯中分別倒入四種不同的水溶液15.0 mL，並加水稀釋至pH值\n均為3.0，杯口封膜。\n2. 置於10℃的環境，存放3天。\n3. 由於蒜頭皆無變色，所以全部改置於25℃的環境繼續存放，於第5天時，\n變色比例如表(十一)。\n表(十一)", "questions": "43. 根據實驗結果，關於不同溫度對蒜頭變綠色的影響，下列說明何者最合理？\n(A)全程在10℃，變色的速率最快\n(B)全程在25℃，變色的速率最快\n(C)先低溫處理，接著改在25℃放置會減緩變色的速率\n(D)先低溫處理，接著改在25℃放置會加快變色的速率\n44. 僅根據實驗三的結果，推測使蒜頭變綠色的有利環境，最可能是下列何者？\n(A)酸性越弱的環境 (B)酸性越強的環境\n(C)有– COOH原子團的環境 (D)沒有– COOH原子團的環境", "length": 398, "unit": "字", "n_q": 2, "answers": [{"q": 43, "answer": "D", "explanation": "表(十)中顯示先低溫處理(前三天)存放溫度為 – 13 ℃、10 ℃ 再放到第五天 的變色比例變成 96% 及 100 %"}, {"q": 44, "answer": "C", "explanation": "實驗三中之表(十一) 顯示，含有－COOH 的食醋與甲酸相較於鹽酸與硫酸 在第 5 天的變色比例為100% 與 70%。"}], "has_figure": true, "id": 41}, {"year": "114", "subject": "自然", "qrange": "49-50", "passage": "阿平想以一顆球作為模擬月球運行造成月相變化的道具，他先將球的其中一半\n塗黑，表示月球未受陽光照射的部分。圖(三十)為由球的正上方往下看的俯視圖，\n圖(三十一)則是進行模擬操作時，由頭頂正上方往下看的俯視圖。他將自己模擬成\n地球的位置，並將球置於甲處，以模擬上弦月時的月、地相對位置狀態，並依\n箭頭的路徑將球慢慢從甲處移至乙處，使球在乙處時模擬下弦月時的狀態。\n圖(三十) 圖(三十一)", "questions": "49. 考量月球在甲、乙兩處的月相，下列俯視圖何者最可能是阿平進行模擬時，球\n於兩處的亮暗面分布狀態？\n（此題選項為圖／表，請見原始試題本）\n(cid:908) (cid:2003)(cid:1139) (cid:1176)\n50. 根據圖(三十一)模擬的月球移動路徑，當月球由甲處移動至乙處的這段時間，\n地球自轉或繞太陽公轉了幾圈？\n(A)地球大約自轉了半圈 (B)地球大約自轉了15圈\n(C)地球繞太陽大約公轉了半圈 (D)地球繞太陽大約公轉了15圈", "length": 166, "unit": "字", "n_q": 2, "answers": [{"q": 49, "answer": "C", "explanation": "上弦月時，月球西邊亮；下弦月時，月球東西邊亮。因此(A)與 (B)兩個 選項明顯地並非東、西方位，故不考慮。(C)與(D)兩選項分析如下圖"}, {"q": 50, "answer": "B", "explanation": "從上弦月至下弦月，地球歷時十五天，故地球自轉約15圈。"}], "has_figure": true, "id": 42}, {"year": "114", "subject": "自然", "qrange": "45-46", "passage": "小花至醫院做「出血時間檢查」，步驟如下：\nㄧ、以針刺耳垂使其流血。\n二、等30秒後以濾紙接觸耳垂。\n三、每隔30秒後再次以濾紙接觸耳垂，以此類推直到出血停止。\n小花檢測結果的紀錄如圖(二十七)，圖中●代表每次以濾紙接觸耳垂所得到的\n出血範圍。表(十二)為本項檢查的參考數值與相關判定的資料。\n表(十二)\n圖(二十七)", "questions": "45. 僅根據小花檢測的初步結果，下列推論何者最合理？\n(A)出血時間過短，須進一步檢查\n(B)出血時間於容許範圍內，可能無異常\n(C)出血時間於容許範圍內，但可能罹患X減少症或其他凝血因子異常\n(D)出血時間過長，可能罹患X減少症或其他凝血因子異常\n46. 表中的X最可能為下列何者？\n(A)淋巴 (B)白血球 (C)紅血球 (D)血小板", "length": 123, "unit": "字", "n_q": 2, "answers": [{"q": 45, "answer": "D", "explanation": "根據附圖，可以看出濾紙上共有十一個點，第一個點是以針刺耳垂使其流血 後，再等待30秒後才以濾紙接觸耳垂，而每個點均間隔30秒，所以第十一個點代 表出血時間為五分三十秒，故選D。"}, {"q": 46, "answer": "D", "explanation": "出血時間與凝血功能有關，而血小板及凝血因子都會影響到凝血功能，血小 板數量過少或是凝血因子異常都會延長出血時間，故選D。"}], "has_figure": true, "id": 43}, {"year": "114", "subject": "自然", "qrange": "47-48", "passage": "如圖(二十八)，阿貴將砝碼掛在動滑輪下，在砝碼靜止不動後，施力使彈簧秤\n以穩定且緩慢的速度向上移動。他用質量100 g、200 g、300 g的砝碼分別做三次上\n述實驗，並記錄彈簧秤拉力讀數F與砝碼質量M的關係，如圖(二十九)。\n圖(二十八) 圖(二十九)", "questions": "47. 阿貴在做砝碼質量為200 g的實驗時，他施一個鉛直向上的定力將彈簧秤以穩\n定且緩慢的速度提高10 cm，並使砝碼上升5 cm，此過程彈簧秤拉力所作的功\n為多少gw．cm？\n(A) 1000 (B) 1500 (C) 2000 (D) 3000\n48. 阿貴經多次重複同樣的實驗所得結果均與圖(二十九)相同，而圖中的三點連\n線之延長線與縱軸F交點不是原點。若不考慮摩擦力，則關於交點不是原點的\n原因，下列敘述何者最合理？\n(A)此實驗的誤差很大\n(B)此實驗裝置屬於費力的簡單機械\n(C)阿貴所記錄彈簧秤讀數F，其數值同時受到彈簧秤質量及砝碼質量的影響\n(D)阿貴所記錄彈簧秤讀數F，其數值同時受到動滑輪質量及砝碼質量的影響", "length": 90, "unit": "字", "n_q": 2, "answers": [{"q": 47, "answer": "B", "explanation": "圖(二十九)中，使用質量為 200 g 的砝碼時所施加的外力為 150 gw。故拉 力作功為 150 x 10 = 1500 gw-cm。"}, {"q": 48, "answer": "D", "explanation": "因為外力施加所要克服的重量為砝碼 + 動滑輪兩者。所以圖形不會通過原 點。"}], "has_figure": true, "id": 44}, {"year": "115", "subject": "國文", "qrange": "30-32", "passage": "親愛的馬爾萬，在我童年的漫長夏天裡，那時我跟你現在一樣大，你叔叔們和\n我會在你爺爺的農舍屋頂上鋪開床墊，那是在霍姆斯城郊外。\n馬爾萬，①我希望你和我一樣記住霍姆斯。在它繁華的老城，有一座我們穆斯\n林的清真寺，一座我們基督徒鄰居的教堂，還有一座我們所有人的大市場，我們在那\n裡為金項鍊和新鮮食材以及新娘禮服討價還價。\n我希望你記得那滿是炸羊肉丸子味道的擁擠小巷，還有那些晚上，②我們和你\n媽媽一起在鐘樓廣場附近散步。但是那樣的生活，那個時候，現在看來都像是夢，就\n算對我來說，都像消失很久的傳聞。\n先是抗議示威，然後是被圍困。天空布滿炸彈，到處是飢餓的人民，與接連不\n斷的葬禮，這些你是知道的。你知道的那些母親們、姊妹們和同學們有可能被埋在水\n泥、磚塊和外露的房梁間的狹窄細縫裡，陽光照射下的小塊皮膚在黑暗中閃閃發光。\n你媽媽今晚也在這裡，馬爾萬，和我們在一起。在這寒冷的月光照耀的海灘\n上，在啼哭的嬰兒中間，在憂慮地說著我們不會講的語言的女人中間。阿富汗人、索\n馬利亞人、伊拉克人還有敘利亞人，我們所有人都在焦急地等待日出，所有人又在害\n怕日出，我們所有人都在尋找家園。\n我聽說我們是不速之客，我們是不受歡迎的，我們應該把災禍帶到別處去。但\n我聽到了你媽媽的聲音，越過潮水，她在我耳邊低語：「噢，如果他們看見，親愛\n的，哪怕只有你所見的一半，只要他們能看見，他們一定會說出善意的話的。」\n我看見你的側臉，在下弦月的光輝中，我的孩子，你的睫毛就像阿拉伯書法一\n樣，在你沉靜的睡眠中緊閉著。我對你說：「抓住我的手，不會有壞事發生。」\n我今夜能想到的，是海有多深，多寬廣，多冷漠。我是多麼無能為力，沒能在\n它面前保護好你。我能做的就是祈禱，祈禱真主讓船航行在正確的方向。③當海岸退\n出視野，我們只是波濤中的一個小點，一旦絆倒或站不穩，很容易就會被吞沒。\n因為你，是珍貴的船貨，馬爾萬。④有史以來最珍貴的船貨。\n我多麼希望大海能明白這一點。\n――改寫自卡勒德．胡賽尼《海的祈禱》", "questions": "30. 根據本文，畫線處的文句何者最能看出爸爸對孩子的重視？\n(A) ① (B) ② (C) ③ (D) ④\n31. 本文中的「我」和馬爾萬，身分最可能是下列何者？\n(A)移民到阿拉伯半島的基督徒 (B)為戰亂國家運送物資的船員\n(C)來自戰爭地區的穆斯林難民 (D)幫災民遠離砲火摧殘的善人\n32. 關於本文的寫作分析，下列敘述何者最恰當？\n(A)藉記憶中的畫面，呈現霍姆斯的今昔變化\n(B)列舉多個國家的名稱，凸顯了航程的漫長\n(C)以等待日出的場景，傳達近鄉情怯的不安\n(D)透過海的深廣，比喻母親話中溫暖的力量", "length": 718, "unit": "字", "n_q": 3, "answers": [{"q": 30, "answer": "D", "explanation": "「有史以來最珍貴的船貨」直接把孩子視為最珍貴的存在，最能表現爸爸對孩 子的重視與保護之情。"}, {"q": 31, "answer": "C", "explanation": "文中提到霍姆斯、穆斯林、戰亂、海灘等待日出、尋找家園、被視為不速之客 等，顯示「我」和馬爾萬最可能是來自戰爭地區的穆斯林難民。"}, {"q": 32, "answer": "A", "explanation": "文章先回憶霍姆斯昔日老城、市場、小巷與散步場景，再寫戰火、逃難與海上 祈禱，透過記憶畫面呈現故鄉今昔變化。"}], "has_figure": false, "id": 45}, {"year": "115", "subject": "國文", "qrange": "26-29", "passage": "【甲】\n2050年全球將有七成的人居住在城\n市，城市必須供養70億人口，但密集開發\n的城市哪還有多餘的土地可耕作？為解決\n城市糧食供應的問題，垂直農場應運而\n生。\n城市垂直農場是把水平的農場，改造\n成種滿植物的摩天大樓，用營養液代替土\n壤，用LED燈取代陽光，這些彷彿科幻小\n說的情節，在專家的努力下正一步步成\n真。垂直農法在密閉的室內種植農作物，\n壓縮了空間，讓效益極大化，節約土地也節約用水量，用水僅是傳統土壤種植\n的十分之一。而樓上種菜、樓下賣菜的經營方式，縮短了食物里程，減少了長\n途運送的資源浪費。\n垂直農場發想者的本意在解決全人類的問題，然而這種耕作方法現階段仍\n有個無法克服的難關，就是生產成本太高。目前只能為少數人服務，無法養活\n全世界。全球人口稠密的城市，有四分之三分布在亞洲，因此相較其他地方，\n亞洲的大都市更加支持垂直農場的發展。\n――改寫自〈未來城市――垂直農場〉\n【乙】\n荷蘭某業者耗鉅資三億歐元，打造全球第\n一座海岸漂浮牧場。業者認為把牧場搬到城市\n的河岸或海岸線，一來節能減碳，二來也為氣\n候變遷海平面上升、土地減少的問題找到解決\n之道。\n這座位於鹿特丹港邊的建築，可說是荷\n蘭循環經濟的展示間。它的屋頂可收集雨\n水，旁邊的太陽能面板，可提供整棟建築所\n需的四成電力。①上層的空間可容納40頭乳牛，一天約產出800公升的鮮奶，\n②乳牛的飼料來自當地高爾夫球場、運動場修剪後的草屑以及啤酒廠用過的穀\n物、麩，全部自動收割混合後，再定時、定量送到乳牛面前。③連擠牛奶和清\n理排泄物的工作，也都由機器代勞，且乳牛的排泄物會被回收再製成肥料。樓\n層中設有加工區，④可直接將乳製品銷往當地，減少運輸成本。參觀者也可在\n現場按下開關直接購買未經高溫消毒的鮮奶。\n但也有研究人員指出這種模式可能較適合用在農業而非畜牧業。「乳牛應\n該在自然棲息地漫步。現在把牠們搬到非常工業化的環境，對許多人而言，會\n認為這不是對待牠們應有的方式。」\n――改寫自〈鹿特丹海岸漂浮牧場落成開放參觀〉", "questions": "26. 根據甲文，下列關於垂直農場的推論，何者最恰當？\n(A)產量與用水量皆高出土壤種植方式\n(B)受天然風災直接的影響少於傳統農業\n(C)亞洲因生產成本較低，更適合垂直農場的發展\n(D)2050年全球將有七成的人必須吃垂直農場栽種的蔬菜\n27. 「循環經濟」強調的是資源可持續回復，循環再生。乙文畫線處的做法，何者\n最能呼應「循環經濟」？\n(A) ①\n(B) ②\n(C) ③\n(D) ④\n28. 乙文提及「研究人員指出這種模式可能較適合用在農業而非畜牧業」，其原因\n最可能是下列何者？\n(A)友善動物\n(B)生產效能\n(C)產品價格\n(D)消費需求\n29. 根據甲、乙二文，「垂直農場」與「漂浮牧場」共同的特點不包含下列何者？\n(A)可以減少食物里程\n(B)設置地點都在城市\n(C)生產所需的資金成本高\n(D)運作時需投入大量人力", "length": 716, "unit": "字", "n_q": 4, "answers": [{"q": 26, "answer": "B", "explanation": "垂直農場在密閉室內種植，較不直接受颱風、豪雨、乾旱等天然風災影響。A錯 在文中說節約用水；C錯在亞洲支持發展是因人口稠密城市多，不是成本較低；D文中 未說七成人口必須吃垂直農場蔬菜。"}, {"q": 27, "answer": "B", "explanation": "②將高爾夫球場、運動場草屑與啤酒廠用過的穀物、麩作為乳牛飼料，使廢棄 或剩餘資源再利用，最符合「循環經濟」。"}, {"q": 28, "answer": "A", "explanation": "研究人員認為乳牛應在自然棲息地漫步，將牠們置於高度工業化環境可能不符 合應有的對待方式，因此主要考量是「友善動物」。"}, {"q": 29, "answer": "D", "explanation": "垂直農場與漂浮牧場都設在城市、可減少食物里程，且建置或生產成本高；但 乙文提到擠奶、清理排泄物可由機器代勞，甲文也偏向科技化操作，因此不共同包含 「需投入大量人力」。"}], "has_figure": false, "id": 46}, {"year": "115", "subject": "國文", "qrange": "37-38", "passage": "東非草原上，鐮莢金合歡樹提供原生舉尾蟻花蜜與住所，而舉尾蟻會保護\n金合歡免受食草性動物侵害，並攻擊啃食金合歡的非洲象。21世紀初，外來的\n熱帶大頭家蟻突然出現在肯亞，牠們會殺死舉尾蟻並吃掉其幼體，讓非洲象得\n以肆無忌憚地啃食金合歡。\n另一方面，金合歡減少，也令獅子在捕獵斑馬時難以掩蔽。研究團隊為了\n解金合歡減少是否會影響獅子獵食，在肯亞保護區的稀樹草原上建立十幾個研\n究區塊，追蹤金合歡景觀變化、斑馬族群密度、熱帶大頭家蟻出現情況以及獅\n子殺死斑馬的情況。\n經過3年的監測，團隊發現沒有舉尾蟻的金合歡被非洲象破壞的速度，比有\n舉尾蟻的樹快5～7倍。這些區域的金合歡覆蓋面積急劇減少，使獅子很難偷偷\n靠近並伏擊斑馬。而沒有熱帶大頭家蟻入侵的地區，斑馬遭獅子獵殺的情況較\n前者高出兩倍以上。\n令人驚訝的是，雖然接觸主要獵物的機會減少，但研究區域的獅子數量卻\n保持穩定。根據其他研究數據，團隊發現當地獅子另外增加捕獵的對象：從\n2003年到2020年，獅子獵殺斑馬的比例從67%下降到42%，而獵殺水牛的比例從\n0%增加到42%。\n針對這樣的結果，專家認為：這些入侵的螞蟻可能早就出現，但沒有人注\n意。我們現在發現牠們以非常微妙的方式改變了生態景觀。\n――改寫自《Science》2024年1月號", "questions": "37. 根據本文，關於熱帶大頭家蟻入侵肯亞保護區後的生態變化，下列敘述何者最\n恰當？\n(A)獅子數量減少\n(B)斑馬易受獅子攻擊\n(C)金合歡易受大象破壞\n(D)舉尾蟻不再攻擊大象\n38. 依據本文引述的研究發現，無法說明下列何者？\n(A)設置保護區有助於維護自然原始生態\n(B)外來物種可能會對本地生態造成衝擊\n(C)面對環境的變遷，生命自會找到出路\n(D)破壞生物間的互利關係恐有連鎖反應", "length": 451, "unit": "字", "n_q": 2, "answers": [{"q": 37, "answer": "C", "explanation": "熱帶大頭家蟻殺死舉尾蟻後，舉尾蟻無法保護金合歡，使非洲象得以大量啃食 金合歡，所以金合歡更容易受大象破壞。"}, {"q": 38, "answer": "A", "explanation": "研究可說明外來物種衝擊本地生態、生物互利關係遭破壞會產生連鎖反應，也 可從獅子改捕水牛看出生命對變遷的調適；但文中未證明「設置保護區有助於維護自 然原始生態」。"}], "has_figure": false, "id": 47}, {"year": "115", "subject": "國文", "qrange": "33-34", "passage": "唐玄宗時，翰林有三種：翰林待詔、翰林供奉、翰林學士。\n翰林待詔這個群體很雜，有詩人，有畫家，有經學家，有書法家，有醫\n生，還有算命先生。這些人被唐玄宗包養起來，辦公之餘，或者出遊的時候，\n把他們喊過去，陪著玩耍，說穿了，就是「幫閒」。\n翰林供奉是翰林待詔裡的佼佼者，譬如說，你寫文章寫得非常漂亮，遠遠\n超過別的翰林待詔，皇帝喊你喊得特別頻繁，今天讓你寫這個，明天讓你寫那\n個，甚至讓你幫他處理奏章，那麼你就成了翰林供奉。\n翰林學士又是翰林供奉裡的佼佼者，不光文筆一流，還通曉政治。朝廷把\n這批人才從待詔和供奉裡發掘出來，讓他們單獨辦公。\n不管是翰林待詔、翰林供奉，還是翰林學士，都沒有專門的品級。不過翰\n林學士一般兼有其他職務，既是翰林學士，又是戶部尚書、禮部尚書、兵部侍\n郎、吏部侍郎等等。雖然翰林學士不領薪水，但是尚書、侍郎卻有不菲的薪\n水。翰林待詔和翰林供奉大都不兼職，可是他們卻有薪水，其中翰林待詔的薪\n水參照九品京官，翰林供奉的薪水參照八品京官。\n――改寫自李開周〈翰林的薪水〉", "questions": "33. 關於文中翰林供奉的敘述，下列何者最恰當？\n(A)可獨立辦公\n(B)有很多兼職收入\n(C)薪水比照八品京官\n(D)不能幫皇帝處理奏章\n34. 根據本文，下列推論何者最恰當？\n(A)尚書和侍郎通常也兼任翰林供奉\n(B)翰林學士處理政務的能力優於翰林供奉\n(C)翰林待詔是唐玄宗重要的行政幕僚之一\n(D)翰林待詔與翰林學士的差別在專門品級的高低", "length": 374, "unit": "字", "n_q": 2, "answers": [{"q": 33, "answer": "C", "explanation": "文末明說翰林供奉大多不兼職，但有薪水，且薪水參照八品京官，因此C正確。"}, {"q": 34, "answer": "B", "explanation": "文中說翰林學士是翰林供奉中的佼佼者，不只文筆一流，還通曉政治，且被挑 出來單獨辦公，因此可推知其處理政務能力優於翰林供奉。"}], "has_figure": false, "id": 48}, {"year": "115", "subject": "國文", "qrange": "35-36", "passage": "兩千多年前已有「投壺」這項活動，主要流行於先秦各國上流階層。投壺前，主\n客間要彼此請讓之後才開始，體現以禮數為旨的精神，而非娛樂競技。秦 漢以後，投\n壺始普及於民間，逐漸演變為酒席宴會上的餘興節目。\n正式開賽時，每人四枝箭，主人站左，客人站右，在離壺兩箭半的\n距離開始輪流投射。每投一箭，計分一次，未投入則得0分，由站在\n壺側面的司射（主持人）計分。四箭投完，司射計算總分，並宣告\n此局勝負，再由司正（監禮人）宣布罰酒。待三局兩勝，司正宣布\n贏家，並由司射宣布比賽結束。\n計 分方式如下：\n【有初】當局第一箭就投中，得10分\n【連中】當局前一箭投中後，次一箭也投中，得5分\n【散箭】當局前一箭沒中，次一箭投中，得1分\n【有終】當局前三箭都沒中，最後一箭投中，得15分", "questions": "35. 根據本文，下列關於投壺的敘述何者最恰當？\n(A)主人要讓分給客人\n(B)由先秦的娛樂競技演變而來\n(C)參賽者各以四箭算一局勝負\n(D)司正以三局分數的總和判定贏家\n36. 右表為某場投壺比賽的計分表， 客人投壺狀況 主人投壺狀況\n「」表示投中，「」表示未投\n第一局        \n中。根據本文及右表，下列敘述何\n第二局        \n者正確？\n第三局        \n(A)第一局客人勝\n(B)第二局主人勝\n(C)第三局客人勝\n(D)最終贏家是主人", "length": 265, "unit": "字", "n_q": 2, "answers": [{"q": 35, "answer": "C", "explanation": "本文說正式開賽時「每人四枝箭」，四箭投完後計算總分、宣告此局勝負，因 此參賽者各以四箭算一局勝負。"}, {"q": 36, "answer": "C", "explanation": "依計分規則，第三局客人前三箭未中、最後一箭投中，屬「有終」得 15分；主 人第一箭中得10分，其後未中，因此第三局客人勝。"}], "has_figure": true, "id": 49}, {"year": "115", "subject": "國文", "qrange": "41-42", "passage": "田饒事魯哀公，而不見察。謂哀公曰：「臣將去君，黃鵠舉矣。」哀公\n曰：「何謂也？」田饒曰：「君獨不見夫雞乎？頭戴冠者，文也；足傅距 者，\n武也；敵在前敢鬥者，勇也；見食相告者，仁也；守夜不失時者，信也。雞雖\n有此五德，君猶烹而食之者，何也？則以其所從來者近也。夫黃鵠一舉千里，\n止君園池，食君魚鱉，啄君黍粱，無此五德，君猶貴之者，何也？以其所從來\n者遠也。臣將去君，黃鵠舉矣。」遂去之燕，燕以為相，三年，燕政大平。\n――改寫自韓嬰《韓詩外傳》\n\n1.足傅距：腳上長著爪子", "questions": "41. 下列文句「」中文字的解釋，何者最恰當？\n(A)田饒事魯哀公，而「不見察」：不懂得自我反省\n(B)「見食相告」者，仁也：看到食物就通知夥伴\n(C)夫黃鵠「一舉千里」：高踞樹頂，眼界開闊\n(D)「遂去之燕」，燕以為相：離開了燕國\n42. 根據本文，田饒認為哀公晉用人才的態度，與下列何者最接近？\n(A)肥水不落外人田\n(B)遠來的和尚會念經\n(C)不求有功，但求無過\n(D)內舉不避親，外舉不避仇", "length": 175, "unit": "字", "n_q": 2, "answers": [{"q": 41, "answer": "B", "explanation": "「見食相告」指看見食物就互相告知，田饒以此說明雞有「仁」德。A「不見 察」是沒有被明察、了解；C「一舉千里」是一起飛就能千里；D「遂去之燕」是離開 魯國到燕國去。"}, {"q": 42, "answer": "B", "explanation": "田饒指出雞雖有五德，但因來自近處而被烹食；黃鵠無五德，卻因來自遠方而 被珍視。這是在批評哀公重遠輕近、貴遠賤近，最接近「遠來的和尚會念經」。"}], "has_figure": false, "id": 50}, {"year": "115", "subject": "國文", "qrange": "39-40", "passage": "僮僕遂者，閩之海山人，至忠。吾妻劉孺人逝時，遂侵曉起，私市餺飥 ，\n漬茗跪進於靈次，拜不止。他僮笑之，遂怒曰：「我孝主母，弗類若不孝也！」\n嘗從余客荔城，過綿亭山，輿翻，遂咎輿夫曰：「明日再
