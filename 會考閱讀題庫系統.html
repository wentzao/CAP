跌，當擇其平坦者，勿\n令碎吾主人輿中物也。」其愚如此。余來杭城，遂哭，將從余，余止之。後得家\n書，遂乃以今年五月十八日被疫死矣。嗚呼！吾聞南方多疫，勞者先死，是必吾\n家役之無方耳，傳之亦所以志余過也。\n――改寫自林紓〈僮遂小傳〉\n\n1.餺飥：湯餅", "questions": "39. 根據本文，下列「」中的字何者當動詞使用？\n(A)「至」忠\n(B)弗類「若」不孝也\n(C)嘗從余「客」荔城\n(D)傳之亦所以志余「過」也\n40. 關於文中僮僕遂的敘述，下列何者最恰當？\n(A)生母過世後，託人購買湯餅祭拜表達孝心\n(B)提醒轎夫選擇平坦的道路，以免自己受傷\n(C)雖想跟從主人前去杭城，最終仍聽命留下\n(D)流落南方不幸染疫，死後輾轉歸葬於海山", "length": 167, "unit": "字", "n_q": 2, "answers": [{"q": 39, "answer": "C", "explanation": "「嘗從余客荔城」中的「客」作動詞，指旅居、作客於荔城。A「至」為副詞， 極、非常；B「若」為代詞，你們；D「過」為名詞，過失。"}, {"q": 40, "answer": "C", "explanation": "文中「余來杭城，遂哭，將從余，余止之」可知僮僕遂想跟從主人到杭城，但 被主人阻止，最後仍留下。"}], "has_figure": false, "id": 51}, {"year": "115", "subject": "英文", "qrange": "35-39", "passage": "The Future of Icelandic Scandinavian News\nby Anna Adams\nIcelandic is a language that is spoken only in Iceland.\nIt has a long history. But many Icelanders are worried that\nthey’re losing Icelandic.\nThe reason for their worry is the prevalence of English\nin Iceland. “I use English when I talk to my housework\nrobot, use my phone, and watch movies,” said Helgi\nAtlason, an engineer. There is a reason for that. Most\nof these products use English, and few companies care to change the language into\nIcelandic because there are only a small number of Icelandic speakers (314,000 people).\nActually, you see English everywhere in Iceland.\nIcelanders also speak and hear more English than Icelandic these days because many\nforeigners who come to live and work in Iceland speak only English. “We can’t use\nIcelandic abroad, and we’re not using it much in Iceland, either. How do you expect our\nkids will want to learn it?” said Eirikur Wilson, a teacher.\nWill Iceland one day give up Icelandic for English? It may happen soon.\nOur Future with Icelandic Scandinavian News\nby Gunnar Eggertsson\nMany people think Icelandic is a language in its\nsickbed and that it needs to be saved. I understand their\nworries, but does the future of our language really look\nthat bad?\nAccording to Dr. David Clingingsmith, a language\nneeds at least 35,000 speakers to be “safe” from becoming\na dying language. There are now 314,000 Icelandic\nspeakers. Also, every year Iceland spends 51.3 million Icelandic crowns (3.7 million\nUS dollars) teaching Icelandic to machines: phones, computers, and robots. Icelandic\nis appearing more often in products. Most importantly, schools still teach Icelandic to\nchildren. Clearly, we are not giving up our first language.\nHowever, I’m not saying that Iceland has done enough for Icelandic. Our country\ncan do a better job at getting more people to speak this beautiful language. One way to\ndo so is to give more language courses to foreigners. With much more work, I’m sure\nIcelandic can grow and even reach farther into the world.\n Icelander 冰島人 product 商品", "questions": "35. What does the prevalence of English mean?\n(A) That English is very common.\n(B) That English is not welcomed.\n(C) That English is easy and simple.\n(D) That English is not a national language.\n36. In the first reading, which is one of the ways that Anna Adams uses to make readers believe\nin her ideas?\n(A) Sharing her own life stories.\n(B) Borrowing from people’s experience.\n(C) Using examples from another language.\n(D) Showing information from news reports.\n37. Which words in the second reading are NOT used to describe Icelandic?\n(A) A language in its sickbed.\n describe 形容\n(B) A dying language.\n(C) Our first language.\n(D) This beautiful language.\n38. Are Anna Adams and Gunnar Eggertsson worried about the future of Icelandic?\n(A) No, they are not.\n(B) Yes, they both are.\n(C) Adams is, but Eggertsson is not.\n(D) Adams is not, but Eggertsson is.\n39. Which idea do Anna Adams and Gunnar Eggertsson both talk about in the readings?\n(A) Whether Icelanders speak better English than Icelandic.\n(B) Whether the number of Icelandic speakers is big enough.\n(C) Whether school subjects should be taught only in Icelandic.\n(D) Whether Iceland should allow more foreigners to work in Iceland.", "length": 345, "unit": "words", "n_q": 5, "answers": [{"q": 35, "answer": "A", "explanation": ""}, {"q": 36, "answer": "B", "explanation": ""}, {"q": 37, "answer": "B", "explanation": ""}, {"q": 38, "answer": "C", "explanation": ""}, {"q": 39, "answer": "B", "explanation": ""}], "has_figure": false, "id": 52}, {"year": "115", "subject": "英文", "qrange": "40-43", "passage": "A long time ago, there was an old king who had no child of his own.\nThe king was worried that his land would fall into the wrong hands\nafter his death, so he decided to pick a child in his land to take the\nhigh seat. One day, he called all the children to his castle and gave\neach of them a seed. “Come back on New Year’s Day and show me\nwhat you have grown,” he said to them, “and I will 40 .”\nEvery child brought their seeds home carefully. One of the children,\nWong, planted his seed in a pot. He gave it water every day and made\nsure there was sun to help it grow. 41 .\nThen, Sung, the child of the richest family in the land, told people that\na small plant was growing from his seed. He was 42 . Everyone\nexcitedly said that he would be king. Soon, one after another, more\nand more children were also saying that they had something in their\npots. But Wong still didn’t find anything in his.\nOn the big day, when Wong brought his pot to the castle, he saw all\nthe other children carrying interesting plants. Some had flowers\nin the shape of a bird, and some had grasses of different colors.\nEveryone proudly showed their plants to the king, but the king\nlooked unhappy until he saw Wong’s pot. “I boiled the seeds before\nI gave them out, so no plants could grow from them.” The king\nlooked seriously at the children. “There is only one child who is\n43 enough to be king.”\nTen years later, the king died. On his deathbed, he was not worried\nbecause he knew Wong would be a good king.", "questions": "40. (A) give you a piece of good land\n(B) choose a person to be the next king\n(C) put the beautiful ones in my castle\n(D) decide who will work in my garden\n41. (A) But he lost his pot a few weeks later\n(B) Months passed but nothing grew from it\n(C) But soon the plant that grew from it died\n(D) The seed grew into a big tree in a short time\n42. (A) the last one to give up\n(B) the first one to share good news\n(C) the first one to bring his pot to the king\n(D) the only one to take good care of his plant\n43. (A) wise\n(B) strong\n(C) honest\n(D) popular", "length": 290, "unit": "words", "n_q": 4, "answers": [{"q": 40, "answer": "B", "explanation": ""}, {"q": 41, "answer": "B", "explanation": ""}, {"q": 42, "answer": "B", "explanation": ""}, {"q": 43, "answer": "C", "explanation": ""}], "has_figure": false, "id": 53}, {"year": "115", "subject": "英文", "qrange": "32-34", "passage": "SEA GLASS: GLASS BOTTLES’ SECOND LIFE\nSea glass is made from the magic of the sea. It usually comes from glass bottles\nthat are thrown into the water. Each piece of sea glass looks different, and sea\nglass is often seen on art pieces. The pictures below explain how sea glass is\nborn.\nGlass bottles are thrown as garbage\n1 into the sea.\nWhen these bottles ride the waves of\nthe sea, they hit each other or other\n2 garbage in the sea and break into\nsmall pieces of glass.\nPieces of glass are pushed by sea water\nand move along the sea floor. The\n3 sharp pieces slowly become rounder\nand rounder.\nAfter tens or hundreds of years in the\nsea, the pieces of glass grow an ice-like\n4 white color on the outside and become\nsea glass.\nSea glass is finally pushed up to the\n5 beach.\nArtists collect pieces of sea glass and\n6 put them into their works.\nHowever, people now seldom use glass to make bottles and bowls—paper bowls\nand cups have become more popular these days. This means there are fewer\nglass items in the sea, so less and less sea glass will be found in the future.", "questions": "32. Why does the title say “Glass Bottles’ Second Life” ?  title 標題\n(A) People collect sea glass and use it to make new glass bottles.\n(B) People collect sea glass at the beach and use it to make wishes.\n(C) Glass bottles that are thrown into the sea become the homes of sea animals.\n(D) Glass bottles that are thrown into the sea become sea glass which is used in art pieces.\n33. According to the reading, how is sea glass made?\n(A) Sea glass becomes rounder after it is pushed up to the beach.\n(B) Colder sea water helps pieces of glass become sea glass faster.\n(C) Pieces of glass become white on the outside after many years in the sea.\n(D) Glass bottles break into pieces when they are dug out from the sea floor.\n34. According to the reading, why will less sea glass be found in the future?\n(A) People do not make as many glass items as before.\n(B) People have learned not to throw garbage into the sea.\n(C) Artists are using too much sea glass in their art pieces.\n(D) Waves are not big enough to push sea glass up to the beach.", "length": 199, "unit": "words", "n_q": 3, "answers": [{"q": 32, "answer": "D", "explanation": ""}, {"q": 33, "answer": "B", "explanation": ""}, {"q": 34, "answer": "A", "explanation": ""}], "has_figure": false, "id": 54}, {"year": "115", "subject": "英文", "qrange": "29-31", "passage": "With heavy hearts, we are here to say goodbye to Rose Lacey, a wonderful\nwriter who will be sadly missed.\nRose and I first met in 2010. I was at a party to pick up my wife when I heard\nRose explaining to her and her friends why Get Across was a great movie. Her\nideas were so interesting that I invited her to write some articles about movies\nfor Action! US. Rose was very excited and agreed right away.\nOver the next ten years, Rose wrote more than 150 articles. Rose could\nalways bring out something new from movies that we thought we knew so well.\nPeople often told me that Rose never failed to surprise them. Her articles often\nmade them think whether they actually saw the same movie, but if they went\nto see it again, they experienced the movie in a whole new way.\nIn her short life of 40 years, Rose has made her mark on the world of movies\nwith her articles for Action! US. We are lucky to have had her in our lives. She\nwas a very special person.\nAlex Jackson\nHead of Action! US\n article 文章", "questions": "29. Why does Alex Jackson write about Rose Lacey?\n(A) Because she died.\n(B) Because she is very sick.\n(C) Because she is moving away.\n(D) Because she is leaving for another job.\n30. How did Rose Lacey and Alex Jackson get to know each other?\n(A) They met at a party. (B) They were relatives.\n(C) They worked in the same office. (D) They took a course on movies together.\n31. What is special about Rose Lacey’s articles?\n(A) They are important to movie makers.\n(B) They talk about movies from a fresh angle.\n(C) They give interesting information about actors.\n(D) They are good examples of how to write stories.", "length": 191, "unit": "words", "n_q": 3, "answers": [{"q": 29, "answer": "A", "explanation": ""}, {"q": 30, "answer": "A", "explanation": ""}, {"q": 31, "answer": "B", "explanation": ""}], "has_figure": false, "id": 55}, {"year": "115", "subject": "英文", "qrange": "27-28", "passage": "One summer evening when English cello player Beatrice\nHarrison was practicing in her garden, she was joined by a\nvisitor she did not expect.\nThe visitor was a nightingale. The small brown bird sang\ntogether with Harrison’s cello music, and the birdsong\nsounded like the piece she was playing. For the next few\nevenings, her visitor kept coming back, sometimes with\nseveral of its friends. Harrison decided that more people\nshould hear the little singers.\nPhoto: Ms. Harrison with the cello\nSo, on May 19, 1924, Harrison worked with the BBC, the UK’s national TV and radio\nstation, and played in her garden. At first, the artist was playing alone. Fifteen minutes\nbefore the end of her playing, the nightingales began to sing with the cello.\nThe nightingale show was popular with radio listeners. It was repeated the next week, and\nfor the next twelve years Harrison played on the radio with her garden friends. During this\ntime, she got 50,000 fan letters. People called her “the Nightingale Lady.”", "questions": "27. Why was Beatrice Harrison called the Nightingale Lady?\n(A) She wrote songs about nightingales.\n(B) She sang as beautifully as a nightingale did.\n(C) She taught nightingales to sing in a radio show.\n(D) She was famous for playing music with nightingales.\n28. Which is NOT used in the reading to mean the nightingale(s) ?\n(A) Her visitor.\n(B) The little singers.\n(C) The artist.\n(D) Her garden friends.", "length": 168, "unit": "words", "n_q": 2, "answers": [{"q": 27, "answer": "D", "explanation": ""}, {"q": 28, "answer": "C", "explanation": ""}], "has_figure": false, "id": 56}, {"year": "115", "subject": "英文", "qrange": "22-23", "passage": "In 6th grade, I tried to get the students\n(cid:20) (cid:21)\nI totally bombed it.\nto pick me as student leader.\nI’ll make class hours shorter.\nAnd we’ll have only three\ndays of school a week…\nWhat? That’s not\nwhat a student\nleader can decide.\nHe doesn’t\nknow anything. I was the best choice,\nbut why didn’t people\nknow that?\nI became a salesperson when I was 23,\n(cid:22) (cid:23)\nI bombed it again.\nand I believed I could be Number 1.\nYou said you would\nHawkins, we don’t need\nsell 50 cars a month.\nyour service anymore.\nDon’t worry.\nBut you sold only 1\nGo pack your things…\nI’ll sell 149 cars\ncar in two months.\nnext month.\nWhy ?\nYou said that\na year ago.", "questions": "22. According to the comics, what kind of person is Hawkins?\n(A) He sees good things in people.\n(B) He never goes to work on time.\n(C) He blindly follows other people.\n(D) He talks about things he can’t do.\n23. What does it mean when we say someone bombed something?\n(A) They gave it up. (B) They failed at it.\n(C) They were fine with it. (D) They were careful about it.", "length": 129, "unit": "words", "n_q": 2, "answers": [{"q": 22, "answer": "D", "explanation": ""}, {"q": 23, "answer": "B", "explanation": ""}], "has_figure": false, "id": 57}, {"year": "115", "subject": "英文", "qrange": "24-26", "passage": "This is a brochure for the Marigolds’ Home.\nThe Marigolds’ Home\nOpening times:\nMarch to October\n10:00-17:00\nNovember to February\n10:00-16:00\nClosed on Mondays\nTo make sure you enjoy your visit to The Marigolds’ Home, we’d like to ask you to follow\nthe rules below:\n1. Pets are not allowed in any areas of the Marigolds’ Home.\n2. Eating and drinking are not allowed inside the buildings, except in the café.\n3. Picture-taking is not allowed inside Sir Archie’s House.\n4. Please take off your shoes before entering the Rabbit’s Temple.\nBecome a member and save 10% on tickets and 30% on all items in the gift shops.\nTo join, visit www.themarigoldshome.com.\n brochure 宣傳手冊", "questions": "24. Which question can the brochure answer?\n(A) Can I order tickets online?\n(B) How much are the tickets?\n(C) How can I get to the Marigolds’ Home?\n(D) When can I visit the Marigolds’ Home?\n25. What breaks the rules for visitors to the Marigolds’ Home?\n(A) Eating burgers in the Rose Garden.\n(B) Taking pictures in the Main House.\n(C) Entering the Rabbit’s Temple without shoes.\n(D) Taking pet dogs for a walk on the playground.\n26. After shopping at the gift shop of the Main House, Lizzy walks out and sees the Family\nLibrary in front of her. She wants to visit the Rose Garden. How can she get there?\n(A) Turn left and walk past the Main House, then go straight and turn right at the corner.\n(B) T urn left and walk past Sir Archie’s House, then turn right and walk past the Main\nHouse.\n(C) T urn right and go straight to the Farmyard, then turn right and go straight, then turn left\nat the corner.\n(D) Turn right and walk through the Butterfly Garden, then walk past the Rabbit’s Temple", "length": 110, "unit": "words", "n_q": 3, "answers": [{"q": 24, "answer": "D", "explanation": ""}, {"q": 25, "answer": "D", "explanation": ""}, {"q": 26, "answer": "C", "explanation": ""}], "has_figure": false, "id": 58}, {"year": "115", "subject": "社會", "qrange": "52-54", "passage": "1843年上海正式開港後不久，西方人就開始在上海租界內尋覓興建賽馬場的\n地點，舉辦賽馬活動。當時管理賽事的單位為上海跑馬總會，會員全由西方人\n組成。部分配合官方自強運動的中國商人家族，也想加入上海跑馬總會，卻總\n是被西方人拒絕。因此中國商人另行籌組萬國體育會，在租界外修建新的賽馬\n場，並於1911年開賽。\n賽馬除了作為運動賽事之外，更以販售馬票的方式開放下注，以高額獎金吸\n引民眾關注賽事。然而國民政府為籌措財源，於1933至1937年發行「航空公路\n建設獎券」，靠著更便宜的彩券、更高額的獎金，將馬票打得潰不成軍。\n1937年，租界外的賽馬場受到戰火破壞，租界內的賽馬場也在1941年後受到\n日本控制。日本為了宣傳自己是東亞民族的解放者，特地開放中國人自由使用\n租界內的賽馬場、足球場等體育設施，之後更進一步將租界交還日本扶植的中\n華民國南京政府，上海租界的歷史就此走入尾聲。", "questions": "52. 上述中國商人家族所經營的事業，最可能為下列何者？\n(A)調查戶口作為掌握稅收依據\n(B)投資鐵路興築與煤鐵礦開採\n(C)承辦國營企業，推行大躍進\n(D)設置市舶司，造船往來西洋\n53. 文中「航空公路建設獎券」的發行，最可能與下列何者有關？\n(A)改革開放在沿海設經濟特區\n(B)北伐結束後十年建設的展開\n(C)庚子後新政推動的改革項目\n(D)因應能源危機推行十大建設\n54. 上文中國人得以自由使用租界內體育場館，最可能與下列何者有關？\n(A)甲午戰爭結束，中國對日本割地賠款\n(B)一次大戰爆發，日本占領德國租借地\n(C)日 俄戰爭結束，日本驅逐俄羅斯勢力\n(D)太平洋戰爭爆發，日本向同盟國宣戰", "length": 326, "unit": "字", "n_q": 3, "answers": [{"q": 52, "answer": "B", "explanation": "題文所述為1840年代以後晚清的中國。「調查戶口作為掌握稅收依據」為 官府之作為，民間、商人不允許此行為；大躍進為中華人民共和國成立以後的事， 不符合時代背景；設置市舶司為隋唐以後的官方課予海外貿易之稅務，民間、商人 不允許此行為。"}, {"q": 53, "answer": "B", "explanation": "「航空公路建設獎券」發行於1933至1937年間，正處於蔣中正北伐完成後 至中日戰爭爆發前的黃金十年時期。"}, {"q": 54, "answer": "D", "explanation": "文中提及「1937年，租界外的賽馬場受到戰火破壞，至1941年起受到日本 控制。日本為了宣傳自己是東亞民族的解放者，特地開放中國人自由使用租界內的 賽馬場等體育設施」。1937年所爆發的戰爭便是中日戰爭(八年抗戰)，故選(D)。"}], "has_figure": false, "id": 59}, {"year": "115", "subject": "社會", "qrange": "49-51", "passage": "自古以來人們就知道要從農\n作物找出有甜味的東西，製成糖\n來食用。因環境的不同，各地\n用來製糖的作物也有差異，如甜\n菜、楓樹等，但公認最適合製糖的\n是甘蔗。臺灣、印尼、菲律賓、\n斐濟和古巴，都曾以蔗糖為重要\n出口貨物。\n日治時期，臺灣蔗田種植面\n圖(十五) 圖(十六)\n積廣大，當時政府為了增加產量，鼓勵設置新式製糖工廠，並公告製糖會社的\n「原料採取區域」，圖(十五)為1928年時的分布。戰後糖廠成為國營事業，其\n收入對當時國內的產業發展有極大助益，而為了提高產能，甚至有糖廠主管於\n1950年寫詞創作廠歌，每天播放以激勵員工士氣，歌詞內容如圖(十六)。\n然而時過境遷，糖廠的產品不侷限於糖，也產製酒精、有機肥、飼料等，\n目前糖廠大多以進口粗糖再加工精製成細砂糖，部分糖廠也已轉型成觀光用\n途，朝向多元化發展。", "questions": "49. 上文中所述最適合製糖的作物，其主要生長環境最可能為下列何者？\n(A)年雨量小於500mm\n(B)最冷月均溫10°C以下\n(C)海拔1,000公尺以上的山坡地\n(D)南緯25度到北緯25度之間的地區\n50. 上文廠歌歌詞的創作背景及圖(十六)描繪的情景，與下列臺灣哪一產業發展階\n段的特色最相符？\n(A)外銷食品加工產品扶植國內輕工業\n(B)設立加工出口區吸引大量外商投資\n(C)因應石油危機推動交通、能源等基礎建設\n(D)持續推動農業轉型升級並發展高科技產業\n51. 上文提及糖廠的多元化發展，其最主要的目的為下列何者？\n(A)降低生產的運輸成本\n(B)減少粗糖的關稅成本\n(C)提高產業的附加價值\n(D)增加甘蔗的種植面積", "length": 288, "unit": "字", "n_q": 3, "answers": [{"q": 49, "answer": "D", "explanation": "依據題文的甘蔗出口國可看出，甘蔗適合種植在熱帶地區，因此答案選(D) 緯度介於南北緯25度之間。 (A)太乾燥，(B)太冷、(C)地勢不利於發展蔗糖業。"}, {"q": 50, "answer": "A", "explanation": "1950年代約為民國40年代，當時臺灣「以農業培養工業」，透過外銷鳳梨、 蔗糖等農產加工業賺取外匯，奠定後來民生輕工業發展的基礎。 (B)加工出口區是民國50年代以後，(C)石油危機發生在1970年代(民國60年代)， (D)為民國69年以後的產業發展脈絡。"}, {"q": 51, "answer": "C", "explanation": "由於國內經濟轉型後，勞力和土地成本高漲而喪失比較利益。傳統糖廠產製 酒精、肥料以及轉型觀光的作法，能延長產業價值鏈，提高產業附加價值。 (A)糖廠轉型或發展觀光，並無法降低原料或產品的運輸成本。(B)多元化經營是因 應製糖成本上升，與國家稅率調整無涉。(D)部分糖廠已轉型不再製糖，因此臺灣 的甘蔗種植面積持續萎縮。"}], "has_figure": true, "id": 60}, {"year": "115", "subject": "社會", "qrange": "46-48", "passage": "立法院在2019年通過《司法院釋字第七四八號\n解釋施行法》，合法保障同性婚姻。\n某日阿華收到一則網路訊息，他擔心訊息中提\n及的疾病傳染情況惡化，覺得應該讓身邊的朋友知\n道這個情況，所以將相關訊息發送至各通訊群組，\n希望廣為流傳，如圖(十四)所示。\n小明在群組上收到這則訊息，想確認訊息的真\n實性，於是上網查詢我國政府公開的統計資料，如\n表(八)。除此之外，小明也上網查詢其他各國的狀\n況，得知聯合國將愛滋病毒盛行率定義為15至49歲\n人口中感染愛滋病毒的人口比率，表(九)是其中部\n圖(十四)\n分國家的統計資料。\n表(八) 表(九)\n新增感染者 累積感染者 國家 中華民國 新加坡 泰國 越南\n年分\n個案數 ( 人 ) 個案數 ( 人 ) 盛行率 (%) 0.3 0.2 1.1 0.3\n2017 2,519 35,935 國家 馬來西亞 西班牙 法國 美國\n2018 1,993 37,919 盛行率 (%) 0.4 0.3 0.3 0.3\n2019 1,756 39,669\n2020 1,392 41,033\n2021 1,247 42,263", "questions": "46. 根據圖(十四)中內容判斷，阿華廣傳訊息所達成的效果，最可能是下列何者？\n(A)透過社群網路影響公共意見 (B)善用大眾媒體爭取婚姻自由\n(C)利用網路科技提供醫學新知 (D)成立民間團體推動法律變革\n47. 根據表(八)與表(九)的資訊判斷，關於圖(十四)中阿華所傳遞的訊息，下列何\n項解讀最適當？\n(A)內容符合事實，因我國通過修法之後導致累積感染者人數增加\n(B)內容符合事實，因我國的愛滋病毒盛行率比東南亞鄰近國家高\n(C)內容與事實不符，因我國統計數據顯示新增感染者人數逐年減少\n(D)內容與事實不符，因我國的愛滋病毒盛行率比歐、美先進國家低\n48. 根據文中小明檢視網路訊息的過程判斷，顯示下列何者的重要性？\n(A)對於跨越國界傳播的疾病，世界各國應共同合作防堵疫情\n(B)對於各種媒體傳播的資訊，閱聽大眾應具備媒體識讀能力\n(C)對於行政機關推動的政策，政府施政應秉持性別平等立場\n(D)對於網路串流平臺的作品，使用者應避免侵害智慧財產權", "length": 266, "unit": "字", "n_q": 3, "answers": [{"q": 46, "answer": "A", "explanation": "阿華把同性婚姻與愛滋病的訊息轉傳到各通訊群組，是透過社群網路影響朋 友對公共議題的意見。 (B)不是大眾媒體，也不是爭取婚姻自由。 (C)阿華不是提供正確醫學新知，而是轉傳待查證訊息。 (D)沒有成立民間團體。"}, {"q": 47, "answer": "C", "explanation": "阿華訊息說：「同性婚姻合法化後，導致罹患愛滋病人數大幅增加。」但表 (八)顯示2019 年修法後，新增感染者並沒有大幅增加，反而逐年減少，所以訊息與 事實不符。 (A) 修法後新增感染者沒有增加。 (B) 表九顯示我國盛行率 0.3%，沒有高於泰國 1.1%、馬來西亞 0.4%。 (D) 雖然我國盛行率不高於歐美表列國家，但這不是判斷該訊息最直接的依據。"}, {"q": 48, "answer": "B", "explanation": "小明收到訊息後，沒有直接相信，而是查詢政府公開統計資料，也查詢其他 國家的狀況來確認真實性。這顯示面對媒體與網路訊息時，閱聽人需要具備媒體識 讀能力。 (A)題目不是討論國際防疫合作。 (C)題目重點不是政府施政是否性別平等。 (D)題目沒有智慧財產權問題。"}], "has_figure": true, "id": 61}, {"year": "115", "subject": "社會", "qrange": "44-45", "passage": "「五腳基」為類似騎樓的建築型式，其源自歐洲國家殖民\n新加坡時，規定連棟店屋的一樓臨街部分，必須設置寬五呎且具\n有頂蓋的步行通道，作為公共空間供人行走，如圖(十三)。此種建\n築型式也常見於中國的某一地區，源於該地區因地形因素可耕地\n較少，糧食不足，部分人口外移至南洋。有些移民家族在南洋經\n商致富後，返回家鄉興建洋樓時將此種建築型式融入其中，至今\n這些洋樓成為特定時空環境下的重要紀錄。 圖(十三)", "questions": "44. 依據上文，建物設置「五腳基」的目的，最可能為下列何者？\n(A)防止蚊蟲及毒蛇的侵擾 (B)因應冬季道路積雪行走不便\n(C)躲避強風發生時產生的沙塵暴 (D)避免溼熱氣候下強烈日晒及雨淋\n45. 上文中提及的洋樓，最主要分布於下列中國的哪一地區？\n(A)西部的高山地區 (B)北部的平原地區\n(C)東南部沿海地區 (D)西北部綠洲地帶", "length": 172, "unit": "字", "n_q": 2, "answers": [{"q": 44, "answer": "D", "explanation": "文中的南洋即東南亞，地處低緯度，全年高溫多對流雨，「五腳基」類似騎 樓，可提供公眾步行時防止日曬雨淋 。"}, {"q": 45, "answer": "C", "explanation": "文中的「該地區因地形因素可耕地較少，糧食不足，導致人口外移」，此為 典型中國東南沿海丘陵地帶「地狹人稠」環境特徵，且居民出海下南洋較為便利。"}], "has_figure": true, "id": 62}, {"year": "115", "subject": "自然", "qrange": "48-50", "passage": "一般而言，鐵生鏽會消耗氧氣。小仲欲了解鐵粉可以和哪些\n氣體反應而進行下列實驗：\n1. 將3.0 g鐵粉浸泡在食醋中一段時間。\n2. 以濾紙濾出鐵粉並移入針筒中，在針筒中通入O 後，將活塞定位\n至5.00 mL刻度處，塞上塞子，如圖(三十二)。定時記錄黑色活塞 5\n刻度位置。\n3. 重複進行步驟1、2，並將步驟2通入的氣體依序換成空氣、\nN 、CO 。實驗數據如表(四)。\n2 2 表(四)\n圖(三十二)\n小仲發現組別四的數據有變化，和預期的不同。他查詢元素對氧的活性資料\n如表(五)，欲判斷組別四針筒內是否發生氧化還原反應。\n表(五)", "questions": "48. 組別一、四通入針筒內的兩種氣體，可依序使用下列何種反應來製備？\n(A)鹽酸和鎂帶反應、雙氧水分解反應\n(B)鹽酸和鎂帶反應、鹽酸和碳酸鈣反應\n(C)雙氧水分解反應、鹽酸和鎂帶反應\n(D)雙氧水分解反應、鹽酸和碳酸鈣反應\n49. 若忽略針筒內鐵粉所占去的體積，試判斷組別二針筒內的氧氣是否完全耗盡？\n(A)全耗盡，消耗氣體比例等於氧氣含量\n(B)全耗盡，消耗氣體比例已超過氧氣含量\n(C)未耗盡，消耗氣體比例高於氧氣含量的\n(D)未耗盡，消耗氣體比例接近氧氣含量的一半\n50. 依據活性大小，判斷組別四針筒內的鐵粉理論上是否與氣體發生氧化還原反應？\n(A)因鐵的活性較小，故鐵粉不會被氧化\n(B)因鐵的活性較小，反應後鐵粉會被氧化\n(C)因鐵的活性較小，反應後氣體會被氧化\n(D)因鐵的活性較大，反應後鐵粉會被氧化", "length": 187, "unit": "字", "n_q": 3, "answers": [{"q": 48, "answer": "D", "explanation": "雙氧水分解產生氧氣。鹽酸和碳酸鈣反應產生二氧化碳。"}, {"q": 49, "answer": "D", "explanation": "氧氣約佔空氣中的20%，約為1 mL。消耗0.5 mL，為氧氣量的一"}, {"q": 50, "answer": "A", "explanation": "依表(五)，鐵的活性較小，因此不易被氧化。"}], "has_figure": true, "id": 63}, {"year": "115", "subject": "自然", "qrange": "44-45", "passage": "圖(二十八)為暄暄用來記錄植物蒸散作用速率的裝置，管中的氣泡會隨著植\n物的蒸散作用逐漸向右方移動，如箭頭所示，可以藉此推測植物的蒸散量。當需\n要使氣泡回到起始點時，可打開閥門使注水管的水向下流，氣泡就會向左移動。\n暄暄將此裝置放在室外一天，並重複於每一整點記錄氣泡的移動距離後，將氣泡\n的位置重新移動回起始點以收集下一整點的數據，最後得到圖(二十九)的數據。\n圖(二十八) 圖(二十九)", "questions": "44. 根據本文，下列對圖(二十九)數據的敘述何者正確？\n(A) 0～1時之間沒有發生蒸散作用\n(B) 3～4時之間沒有發生蒸散作用\n(C) 12～13時的平均蒸散速率為一天中最大值\n(D) 6～7時的平均蒸散速率較7～8時的平均蒸散速率大\n45. 若依據暄暄的方式操作實驗，但將實驗裝置移至通風良好的乾燥室內放置\n兩天，則最不可能發生下列哪一種情況？\n(A)第一、二天記錄到的氣泡移動距離總和相近\n(B)在兩天的相同時段中，氣泡移動的距離相近\n(C)植物氣孔關閉減緩蒸散，使管中氣泡移動量很小\n(D)植物從氣孔吸收水分向下運輸，使管中氣泡向左移動", "length": 168, "unit": "字", "n_q": 2, "answers": [{"q": 44, "answer": "C", "explanation": "根據附圖可知此植物在每一小時中都有進行蒸散作用，其中 12～13"}, {"q": 45, "answer": "D", "explanation": "(A)(B)若室內的環境條件與室外相同，有可能會獲得相似的實驗結"}], "has_figure": true, "id": 64}, {"year": "115", "subject": "自然", "qrange": "46-47", "passage": "科學家設計實驗以研究水滴落至石英板的變化情形，裝置示意圖如圖(三十)，使\n用高速攝影機，拍攝水滴從針頭滴出後由靜止自由落下至石英板，然後再向上飛\n濺的過程，並用感測器量測水滴衝擊石英板時，作用在石英板上的力(F)，記錄其\n隨時間(t)的變化情形。圖(三十一)為某次實驗的數據，圖上照片為該時刻水滴狀態的\n照片。\n圖(三十) 圖(三十一)", "questions": "46. 科學家想要觀察水滴以不同的速度，衝擊石英板時的變化情形，若不考慮空氣\n阻力，則他調整下列哪一項實驗條件最合理？\n(A)調整水滴的溫度，以改變水滴的密度\n(B)調整針頭的孔徑，以改變水滴的直徑與重量\n(C)調整針頭的高度，以改變水滴落下的垂直距離\n(D)調整攝影機的設定，以改變攝影機每秒拍攝畫面的張數\n47. 根據本文，已知石英板作用在水滴的力為F ′，F′即F的反作用力，則\n圖(三十一)中呈現的四個狀態，哪一個狀態下F′的大小最大？\n（此題選項為圖／表，請見原始試題本）", "length": 138, "unit": "字", "n_q": 2, "answers": [{"q": 46, "answer": "C", "explanation": "題文：觀察水滴不同速度的力。不同高度落下，可改變運動速度。"}, {"q": 47, "answer": "A", "explanation": "作用力與反作用力大小相等，方向相反。(A)為圖中最大的F。"}], "has_figure": true, "id": 65}, {"year": "115", "subject": "自然", "qrange": "42-43", "passage": "科學家定義酸雨為受到人為汙染物影響，且pH值小於5.0的雨水。小洲在報紙\n上閱讀到兩則對同一事件描述的報導，如圖(二十六)與圖(二十七)。\n圖(二十六) 圖(二十七)\n他閱讀完這兩則報導後，想了解某個問題，因此另外收集了部分地區的數據\n並分為甲、乙兩組，如表(三)。\n表(三)\n環保署已於2023年升格為環境部", "questions": "42. 圖(二十七)中，造成兩種結果差異的其其他他原原因因，最可能為下列何者？\n(A)該市酸雨的發生機率高，超過50%\n(B)環保署與該市環保局對於酸雨的定義不同\n(C)環保署所測出的該市雨水pH值太接近5.0\n(D)單一測站的測量結果會與多個測站平均值有差異\n43. 將表(三)的資料分成甲、乙兩組，最可能是想用來了解下列哪一個問題？\n(A)位於東北季風迎、背風面是否會影響判定酸雨的標準\n(B)位於東北季風迎、背風面是否會影響雨水pH值的平均\n(C)各地區雨水pH值的平均高低是否影響酸雨發生的機率\n(D)各地區雨水pH值的平均高低是否影響人為汙染物的種類", "length": 118, "unit": "字", "n_q": 2, "answers": [{"q": 42, "answer": "D", "explanation": "圖(二十六)的報導僅採用單一測站進行評估，圖(二十七)報導指出該"}, {"q": 43, "answer": "B", "explanation": "臺北與宜蘭位處東北季風迎風面，pH值僅略大於5.0；雲林與嘉義位"}], "has_figure": true, "id": 66}];
const state={sub:new Set(['國文','英文','社會','自然']),yr:new Set(['113','114','115']),sel:new Set()};
const SC={'國文':'#7a4f2a','英文':'#1f6f5c','社會':'#03492d','自然':'#8a6d1f'};
document.getElementById('total').textContent=BANK.length;

function tog(el,kind){el.classList.toggle('on');
  const v=el.dataset[kind]; const s=state[kind];
  if(el.classList.contains('on'))s.add(v);else s.delete(v); render();}

function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function visible(){const q=document.getElementById('q').value.trim();
  const ml=+document.getElementById('minlen').value||0;
  return BANK.filter(it=>state.sub.has(it.subject)&&state.yr.has(it.year)
    &&it.length>=ml&&(!q||(it.passage+it.questions).includes(q)));}

function render(){const list=document.getElementById('list');const items=visible();
  list.innerHTML=items.map(it=>{
    const sel=state.sel.has(it.id)?'sel':'';
    const fig=it.has_figure?'<span class="fig">⚠ 含圖/表</span>':'';
    const ans=it.answers.map(a=>`<div><span class="a">${a.q}. (${a.answer||'?'})</span>${a.explanation?' '+esc(a.explanation):''}</div>`).join('');
    return `<div class="card ${sel}" id="card${it.id}">
      <div class="chead">
        <input type="checkbox" ${state.sel.has(it.id)?'checked':''} onchange="pick(${it.id},this.checked)">
        <span class="badge b${it.subject}">${it.year}年 ${it.subject}</span>
        <span class="meta">第 ${it.qrange} 題 · ${it.length}${it.unit} · ${it.n_q}題</span>
        ${fig}
        <button class="toggle" onclick="openBody(${it.id})">展開 ▾</button>
      </div>
      <div class="body" id="body${it.id}">
        <div class="passage">${esc(it.passage)}</div>
        <div class="qs">${esc(it.questions)}</div>
        <button class="toggle" style="margin:6px 0" onclick="toggleAns(${it.id})">顯示答案／詳解 ▾</button>
        <div class="ans" id="ans${it.id}">${ans}</div>
      </div></div>`;}).join('');
  document.getElementById('shown').textContent='顯示 '+items.length+' 篇';
  document.getElementById('nsel').textContent=state.sel.size;}

function pick(id,on){if(on)state.sel.add(id);else state.sel.delete(id);
  document.getElementById('card'+id).classList.toggle('sel',on);
  document.getElementById('nsel').textContent=state.sel.size;}
function openBody(id){document.getElementById('body'+id).classList.toggle('open');}
function toggleAns(id){document.getElementById('ans'+id).classList.toggle('show');}
function toggleAnsAll(){document.querySelectorAll('.body').forEach(b=>b.classList.add('open'));
  const any=document.querySelector('.ans.show');document.querySelectorAll('.ans').forEach(a=>a.classList.toggle('show',!any));}
function selAll(on){visible().forEach(it=>{if(on)state.sel.add(it.id);else state.sel.delete(it.id);});render();}

function selectedItems(){return BANK.filter(it=>state.sel.has(it.id))
  .sort((a,b)=>a.year.localeCompare(b.year)||a.subject.localeCompare(b.subject));}

/* ---------- generate Reveal slideshow ---------- */
function makeSlides(){
  const items=selectedItems();
  if(!items.length){alert('請先勾選至少一題！');return;}
  const incAns=document.getElementById('incAns').checked;
  const hideSubj=document.getElementById('hideSubj').checked;
  let slides=`<section data-background-color="#03492d">
    <h1 style="color:#fff;font-size:2.6em;letter-spacing:2px">會考長文閱讀</h1><p style="color:#bfe6d3;font-size:1.1em">自選練習 · 共 ${items.length} 篇</p>
    <p style="color:#a9d6c1;font-size:.5em">每張先讀文章，想想答案；${hideSubj?'點一下顯示科目，':''}${incAns?'再點一下看答案。':'答案請見原試題。'}</p>
    <p style="color:#7ec8a4;font-size:.42em;letter-spacing:4px;margin-top:1em">文藻美語 · WENTZAO SCHOOL</p></section>`;
  items.forEach((it,i)=>{
    const c=SC[it.subject];
    const subjReveal=hideSubj
      ? `<span class="frag-subj" data-c="${c}" data-label="${it.year}年 ${it.subject} 第${it.qrange}題"></span>`
      : `<span style="background:${c};color:#fff;padding:2px 10px;border-radius:14px;font-size:.6em">${it.year}年 ${it.subject} 第${it.qrange}題</span>`;
    let ansHtml='';
    if(incAns){ansHtml=`<div class="fragment ansbox"><b>答案：</b>`+
      it.answers.map(a=>`${a.q}.(${a.answer||'?'})`).join('　')+
      it.answers.filter(a=>a.explanation).map(a=>`<div class="exp">${a.q}. ${esc(a.explanation)}</div>`).join('')+`</div>`;}
    slides+=`<section>
      <div class="qhead">
        <span class="qno">#${i+1}</span>
        ${subjReveal}
        <span class="qwc">📝 ${it.length}${it.unit}・${it.n_q}題</span>
      </div>
      <div class="scrollbox">
        <div class="passage">${esc(it.passage)}</div>
        <div class="qs">${esc(it.questions)}</div>
        ${ansHtml}
      </div></section>`;});
  const doc=SLIDE_TPL.replace('__SLIDES__',slides).replace('__HIDE__',hideSubj?'true':'false');
  const w=window.open('','_blank');w.document.write(doc);w.document.close();}

/* ---------- generate Word (.doc) ---------- */
function makeWord(){
  const items=selectedItems();
  if(!items.length){alert('請先勾選至少一題！');return;}
  const incAns=document.getElementById('incAns').checked;
  let body=`<h1 style="color:#03492d">會考長文閱讀 練習卷</h1>
    <p style="color:#475569">自選練習 · 共 ${items.length} 篇 · 國文／英文／社會／自然（113～115年）</p>
    <p style="color:#475569;font-size:11pt">使用方法：先把整篇讀完，再回到文章找線索作答。每題附上出處（年份＋科目＋題號）。</p><hr>`;
  items.forEach((it,i)=>{
    const c=SC[it.subject];
    body+=`<div style="margin-top:18px">
      <p style="background:${c};color:#fff;padding:6px 12px;font-weight:bold">
        練習 #${i+1}　${it.year}年 ${it.subject}　第${it.qrange}題　｜　字數 ${it.length}${it.unit}　｜　共 ${it.n_q} 題${it.has_figure?'　（原題含圖/表）':''}</p>
      <p style="font-weight:bold;color:${c}">【選文】</p>
      <div style="border-left:4px solid #94a3b8;padding-left:10px;white-space:pre-wrap">${esc(it.passage)}</div>
      <p style="font-weight:bold;color:${c}">【題目】</p>
      <div style="white-space:pre-wrap">${esc(it.questions)}</div></div>`;
    if(incAns){body+=`<div style="background:#ecfdf5;border:1px solid #a7f3d0;padding:8px 12px;margin-top:6px">
      <b>答案：</b>`+it.answers.map(a=>`${a.q}.(${a.answer||'?'})`).join('　')+
      it.answers.filter(a=>a.explanation).map(a=>`<div style="font-size:10.5pt;margin-top:4px">${a.q}. ${esc(a.explanation)}</div>`).join('')+`</div>`;}
    body+=`<hr>`;});
  if(incAns){body+=`<h2 style="page-break-before:always;color:#03492d">答案總表</h2><table border="1" cellpadding="5" style="border-collapse:collapse">
    <tr style="background:#dcefe6"><th>#</th><th>出處</th><th>答案</th></tr>`+
    items.map((it,i)=>`<tr><td>${i+1}</td><td>${it.year} ${it.subject} 第${it.qrange}題</td><td>${it.answers.map(a=>a.q+'.('+(a.answer||'?')+')').join('　')}</td></tr>`).join('')+`</table>`;}
  const html=`<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>會考閱讀練習卷</title></head><body>${body}</body></html>`;
  const blob=new Blob(['﻿'+html],{type:'application/msword'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`會考閱讀練習卷_自選${items.length}題.doc`;a.click();}

render();
</script>
